<script>
// ============================================================
// SISTEMA DE GANADOR + RECEPCION DE DATOS API
// ============================================================
(function() {
  window.__casinoHandlers = window.__casinoHandlers || {};
  
  // Confeti animation con canvas
  const confettiCanvas = document.getElementById('winnerConfetti');
  let confettiCtx, confettiParticles = [], confettiActive = false, confettiAnimId;
  
  function startConfetti() {
    if (!confettiCanvas) return;
    confettiCanvas.width = window.innerWidth;
    confettiCanvas.height = window.innerHeight;
    confettiCtx = confettiCanvas.getContext('2d');
    confettiParticles = [];
    
    // Generar 150 particulas
    for (let i = 0; i < 150; i++) {
      confettiParticles.push({
        x: Math.random() * confettiCanvas.width,
        y: -20 - Math.random() * 200,
        vx: (Math.random() - 0.5) * 4,
        vy: 2 + Math.random() * 4,
        size: 4 + Math.random() * 6,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2,
        color: ['#ffd700', '#ff6600', '#ff3300', '#00ff88', '#ffffff', '#ffaa00'][Math.floor(Math.random()*6)]
      });
    }
    
    confettiActive = true;
    animateConfetti();
  }
  
  function animateConfetti() {
    if (!confettiActive) return;
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    
    confettiParticles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;  // gravedad
      p.rot += p.rotSpeed;
      
      confettiCtx.save();
      confettiCtx.translate(p.x, p.y);
      confettiCtx.rotate(p.rot);
      confettiCtx.fillStyle = p.color;
      confettiCtx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.4);
      confettiCtx.restore();
      
      // Reciclar si sale del canvas
      if (p.y > confettiCanvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * confettiCanvas.width;
        p.vy = 2 + Math.random() * 4;
      }
    });
    
    confettiAnimId = requestAnimationFrame(animateConfetti);
  }
  
  function stopConfetti() {
    confettiActive = false;
    if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
    if (confettiCtx) confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
  
  // Fuegos artificiales (chispas que explotan)
  function spawnFireworks() {
    const modal = document.getElementById('winnerModal');
    if (!modal) return;
    
    for (let i = 0; i < 25; i++) {
      setTimeout(() => {
        const fw = document.createElement('div');
        fw.className = 'firework';
        const x = 20 + Math.random() * 60; // 20%-80% pantalla
        const y = 20 + Math.random() * 60;
        fw.style.left = x + '%';
        fw.style.top = y + '%';
        fw.style.background = ['#ffd700', '#ff6600', '#00ff88', '#ffffff'][Math.floor(Math.random()*4)];
        fw.style.boxShadow = '0 0 10px ' + fw.style.background;
        fw.style.setProperty('--tx', ((Math.random()-0.5) * 200) + 'px');
        fw.style.setProperty('--ty', ((Math.random()-0.5) * 200) + 'px');
        fw.style.animation = 'fireworkExplode 1.2s ease-out forwards';
        modal.appendChild(fw);
        setTimeout(() => fw.remove(), 1300);
      }, i * 80);
    }
  }
  
  // Mostrar modal de ganador
  function showWinnerModal(sheetId, amount, maquina, posicion) {
    const modal = document.getElementById('winnerModal');
    const titleEl = document.getElementById('winnerTitle');
    const msgEl = document.getElementById('winnerMessage');
    const amountEl = document.getElementById('winnerAmount');
    const machineEl = document.getElementById('winnerMachine');
    
    if (!modal) return;
    
    // Marcar el sheet activo del modal (lo usa /reinicio para decidir
    // si postergar o aplicar directo).
    window.__activeWinnerSheet = sheetId;
    
    // Configurar titulo segun la hoja
    const titles = {
      mini: 'MINI JACKPOT',
      minor: 'MINOR JACKPOT', 
      major: 'MAJOR JACKPOT',
      grand: 'GRAND JACKPOT'
    };
    const messages = {
      mini: '¡FELICIDADES POR GANAR!',
      minor: '¡FELICIDADES POR GANAR!',
      major: '¡FELICIDADES TE GANASTE LA MOTO!',
      grand: '¡FELICIDADES TE GANASTE EL AUTO!'
    };
    
    titleEl.textContent = '¡' + titles[sheetId] + '!';
    msgEl.textContent = messages[sheetId];

    // ============================================================
    // ACENTO DE COLOR por sheet (se aplica al borde del modal,
    // glow exterior y al brillo del sprite). El dorado base se
    // mantiene en banderas, trofeo y rayos.
    // ============================================================
    const accents = {
      mini: '#00ff66',
      minor: '#ff0033',
      major: '#ffaa00',
      grand: '#00e5d4'
    };
    modal.style.setProperty('--winner-accent', accents[sheetId] || '#ffd700');

    // ============================================================
    // SPRITE giratorio (auto/moto) al lado del titulo en grand/major.
    // Mini/minor: ocultos (no son vehiculo, son efectivo).
    // ============================================================
    const boxL = document.getElementById('winnerVehicleBoxLeft');
    const boxR = document.getElementById('winnerVehicleBoxRight');
    const sprL = document.getElementById('winnerSpriteLeft');
    const sprR = document.getElementById('winnerSpriteRight');
    if (boxL && boxR && sprL && sprR) {
      // Resetear clases de sprite
      sprL.className = 'winner-sprite';
      sprR.className = 'winner-sprite';
      boxL.classList.remove('show');
      boxR.classList.remove('show');
      if (sheetId === 'grand') {
        sprL.classList.add('winner-car');
        sprR.classList.add('winner-car');
        boxL.classList.add('show');
        boxR.classList.add('show');
      } else if (sheetId === 'major') {
        sprL.classList.add('winner-moto');
        sprR.classList.add('winner-moto');
        boxL.classList.add('show');
        boxR.classList.add('show');
      }
      // En mini/minor ambos quedan ocultos (no .show)
    }

    // ============================================================
    // AUDIO del ganador. Si el archivo no existe, falla silencioso.
    // Volumen segun config (modalVideoVolume).
    // ============================================================
    const winnerAudio = document.getElementById('winnerAudio');
    if (winnerAudio) {
      try {
        winnerAudio.currentTime = 0;
        winnerAudio.volume = (window.CASINO_CONFIG && window.CASINO_CONFIG.modalVideoVolume !== undefined)
          ? window.CASINO_CONFIG.modalVideoVolume
          : 0.7;
        const playPromise = winnerAudio.play();
        if (playPromise && playPromise.catch) {
          playPromise.catch(e => console.log('[WINNER] Audio no disponible:', e.message));
        }
      } catch (e) {
        console.log('[WINNER] Error reproduciendo audio:', e.message);
      }
    }
    
    if (sheetId === 'mini' || sheetId === 'minor') {
      // Marcar el modal con el sheet para que el loop globalAnimate
      // escriba el monto SINCRONIZADO con el sheet y el home.
      modal.dataset.sheet = sheetId;
      const amountText = document.getElementById('winnerAmountText');
      if (amountText) {
        // Texto inicial = valor ACTUAL del odometro (no salta).
        // El loop seguira escribiendolo cuadro a cuadro hasta llegar al target.
        const state = (typeof globalAnimate !== 'undefined' && globalAnimate.state) ? globalAnimate.state : null;
        const cents = (state && state.miniMinorOdo && state.miniMinorOdo[sheetId] !== undefined)
          ? state.miniMinorOdo[sheetId]
          : Math.round((amount || 0) * 100);
        amountText.textContent = 'S/ ' + (cents / 100).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
      }
      amountEl.style.display = 'inline-block';
    } else {
      modal.dataset.sheet = '';
      amountEl.style.display = 'none';
    }
    
    const machineText = document.getElementById('winnerMachineText');
    if (machineText) {
      // Formato: "MAQUINA #102030-5" si hay posicion, sino "MAQUINA #102030"
      let maquinaStr = 'MAQUINA #' + (maquina || '000');
      if (posicion !== undefined && posicion !== null && posicion !== '') {
        maquinaStr += '-' + posicion;
      }
      machineText.textContent = maquinaStr;
    }
    
    // Mostrar modal
    modal.classList.add('showing');
    startConfetti();
    
    // Disparar fuegos en oleadas
    spawnFireworks();
    setTimeout(spawnFireworks, 1500);
    setTimeout(spawnFireworks, 3000);
    
    // Cerrar despues de duracion configurada
    const durationSec = window.CASINO_CONFIG.winnerModalDurationSec || 12;
    const duration = durationSec * 1000;

    // Countdown visual en esquina inferior derecha
    const countdownEl = document.getElementById('winnerCountdown');
    if (countdownEl) {
      let secsLeft = durationSec;
      countdownEl.textContent = secsLeft;
      // Limpiar interval anterior si existia
      if (window.__winnerCountdownInterval) clearInterval(window.__winnerCountdownInterval);
      window.__winnerCountdownInterval = setInterval(() => {
        secsLeft--;
        if (secsLeft <= 0) {
          countdownEl.textContent = 0;
          clearInterval(window.__winnerCountdownInterval);
          window.__winnerCountdownInterval = null;
        } else {
          countdownEl.textContent = secsLeft;
        }
      }, 1000);
    }

    setTimeout(() => {
      modal.classList.remove('showing');
      document.body.classList.remove('winner-visible');
      stopConfetti();
      if (window.__winnerCountdownInterval) {
        clearInterval(window.__winnerCountdownInterval);
        window.__winnerCountdownInterval = null;
      }
      // Detener audio del ganador al cerrar el modal
      const wa = document.getElementById('winnerAudio');
      if (wa) {
        try { wa.pause(); wa.currentTime = 0; } catch (e) {}
      }
      
      // Limpiar sheet activo del modal
      const closedSheet = window.__activeWinnerSheet;
      window.__activeWinnerSheet = null;
      
      // Procesar reinicios que quedaron postergados para este sheet
      if (window.__pendingReinicios && window.__pendingReinicios.length > 0) {
        const remaining = [];
        window.__pendingReinicios.forEach(rData => {
          if (rData.sheet === closedSheet) {
            console.log('[API][REINICIO] Aplicando reinicio postergado:', rData.sheet);
            // Reenviar al onUpdate para que aplique con la logica normal
            // (que ahora ya no encontrara modal activo de ese sheet)
            window.__casinoHandlers.onUpdate(rData);
          } else {
            remaining.push(rData);
          }
        });
        window.__pendingReinicios = remaining;
      }
    }, duration);
    
    console.log('[WINNER] Modal mostrado:', sheetId, 'amount:', amount, 'maquina:', maquina);
  }
  
  // Handler de datos del API
  window.__casinoHandlers.onUpdate = function(data) {
    if (!data || !data.sheet) return;
    
    console.log('[API] === UPDATE RECIBIDO ===', JSON.stringify(data));
    
    if (typeof globalAnimate === 'undefined' || !globalAnimate.state) {
      console.warn('[API] globalAnimate.state no existe, reintentando en 500ms');
      setTimeout(() => window.__casinoHandlers.onUpdate(data), 500);
      return;
    }
    
    const state = globalAnimate.state;
    
    // ============================================================
    // ENDPOINT /reinicio: snap instantaneo del odometro mini/minor.
    // Si el modal ganador esta activo Y es del MISMO sheet, encolar
    // hasta que cierre. Si es OTRO sheet o no hay modal, aplicar ya.
    // No dispara modal, no es ganador.
    // ============================================================
    if (data._endpoint === 'reinicio') {
      const isWinnerSameSheet = !!(window.__activeWinnerSheet && window.__activeWinnerSheet === data.sheet);
      
      if (isWinnerSameSheet) {
        // Postergar: guardar la peticion para aplicar cuando el modal cierre
        if (!window.__pendingReinicios) window.__pendingReinicios = [];
        window.__pendingReinicios.push(data);
        console.log('[API][REINICIO] Postergado (modal ganador del mismo sheet activo):', data.sheet);
        return;
      }
      
      // Aplicar snap directo: setear tanto el valor actual como el target al mismo valor
      if (data.sheet === 'mini' || data.sheet === 'minor') {
        if (!state.miniMinorOdo) state.miniMinorOdo = {};
        if (!state.miniMinorTarget) state.miniMinorTarget = {};
        const newCents = Math.round(data.amount * 100);
        state.miniMinorOdo[data.sheet] = newCents;
        state.miniMinorTarget[data.sheet] = newCents;
        console.log('[API][REINICIO] Snap aplicado:', data.sheet, '=', data.amount, '(centavos:', newCents, ')');
      }
      return;
    }
    
    // Log estado actual del target ANTES de actualizar
    if (state.miniMinorTarget) {
      console.log('[API] Target ANTES:', JSON.stringify(state.miniMinorTarget));
    }
    
    // ============================================================
    // ACTUALIZAR TARGET para que la animacion interpole hacia ese valor
    // (Esto siempre se hace, en modo prueba o produccion)
    // ============================================================
    if (data.sheet === 'mini' || data.sheet === 'minor') {
      if (data.amount !== undefined) {
        if (!state.miniMinorTarget) state.miniMinorTarget = {};
        if (!state.miniMinorOdo) state.miniMinorOdo = {};
        
        const newTargetCents = Math.round(data.amount * 100);
        const currentValue = state.miniMinorOdo[data.sheet] || 0;
        
        // Si el valor nuevo es MENOR que el actual, salto instantaneo (no animar bajando)
        if (newTargetCents < currentValue) {
          console.log('[API] Valor menor recibido - salto instantaneo:', currentValue, '->', newTargetCents);
          state.miniMinorOdo[data.sheet] = newTargetCents;
          state.miniMinorTarget[data.sheet] = newTargetCents;
        } else {
          // Valor mayor o igual: interpolar hacia el target (como antes)
          state.miniMinorTarget[data.sheet] = newTargetCents;
          console.log('[API] Target NUEVO:', data.sheet, '=', data.amount, '(centavos:', newTargetCents, '). Actual:', currentValue);
        }
      }
    }
    
    // ============================================================
    // ACTUALIZACION INMEDIATA del reel visual (sin esperar al loop)
    // Funciona aunque la hoja no este activa
    // ============================================================
    if ((data.sheet === 'mini' || data.sheet === 'minor') && data.amount !== undefined) {
      // Buscar la hoja correspondiente (este o no activa)
      const targetSheet = document.querySelector('.sheet[data-id="' + data.sheet + '"]');
      if (targetSheet) {
        const reels = targetSheet.querySelectorAll('.reel-strip');
        if (reels.length > 0) {
          // Si es modo produccion, mostrar valor exacto
          if (!window.CASINO_CONFIG.useTestData) {
            // El loop interpolara desde miniMinorOdo hasta target suavemente
            // pero forzamos que arranque desde el valor actual del DOM si esta vacio
            if (!state.miniMinorOdo) state.miniMinorOdo = {};
            if (state.miniMinorOdo[data.sheet] === undefined) {
              state.miniMinorOdo[data.sheet] = 0;
            }
          }
        }
      }
    }
    
    // ============================================================
    // ACTUALIZAR odómetro del HOME y modal: YA NO se hace aqui.
    // Lo hace el loop globalAnimate via syncHomeAndModalOdometer(),
    // leyendo del MISMO state.miniMinorOdo que mueve el sheet.
    // Asi los 3 odometros suben juntos con la misma animacion.
    // ============================================================
    
    // ============================================================
    // GANADOR
    // ============================================================
    if (data.ganador === true) {
      const delay = (window.CASINO_CONFIG.winnerDelaySec || 5) * 1000;
      console.log('[API] GANADOR:', data.sheet, '- modal en', delay, 'ms');
      
      // Para mini/minor: actualizar target a monto final ANTES del delay
      if ((data.sheet === 'mini' || data.sheet === 'minor') && data.amount !== undefined) {
        if (!state.miniMinorTarget) state.miniMinorTarget = {};
        state.miniMinorTarget[data.sheet] = Math.round(data.amount * 100);
      }
      
      setTimeout(() => {
        showWinnerModal(data.sheet, data.amount, data.maquina, data.posicion);
      }, delay);
    }
  };
  
  // Funcion de prueba (para testing manual desde consola)
  window.testWinner = function(sheet, amount, maquina, posicion) {
    showWinnerModal(sheet || 'mini', amount || 12345, maquina || '102030', posicion);
  };
  
  console.log('[API] Sistema de ganador iniciado');
  console.log('[API] Para probar manualmente: window.testWinner("mini", 12345, "102030", 5)');
  console.log('[API] Para enviar datos: window.casinoUpdate({sheet: "mini", amount: 5000, ganador: false, codSala: "S01", idRace: 1})');
  console.log('[CONFIG]', window.CASINO_CONFIG);
})();
</script>


<!-- ============================================================
     ANIMADOR DE SPRITES (reemplazo de Three.js - 0% GPU)
     ============================================================ -->
<script>
(function() {
  // 36 frames en grid 6x6
  const FRAMES = 36;
  const COLS = 6;
  const ROWS = 6;
  
  function getFramePosition(frame) {
    const col = frame % COLS;
    const row = Math.floor(frame / COLS);
    // Porcentajes: cada paso = 100/(N-1) %
    // col 0 = 0%, col 5 = 100%
    const xPct = (col / (COLS - 1)) * 100;
    const yPct = (row / (ROWS - 1)) * 100;
    return xPct + '% ' + yPct + '%';
  }
  
  let motoFrame = 0;
  let autoFrame = 0;
  
  function animate() {
    const activeSheet = document.querySelector('.sheet.active');
    if (!activeSheet) {
      setTimeout(animate, 500);
      return;
    }
    
    const sheetId = activeSheet.dataset.id;
    
    if (sheetId === 'major') {
      const sprite = document.getElementById('motoSprite');
      if (sprite) {
        motoFrame = (motoFrame + 1) % FRAMES;
        sprite.style.backgroundPosition = getFramePosition(motoFrame);
      }
    } else if (sheetId === 'grand') {
      const sprite = document.getElementById('autoSprite');
      if (sprite) {
        autoFrame = (autoFrame + 1) % FRAMES;
        sprite.style.backgroundPosition = getFramePosition(autoFrame);
      }
    }
    
    // Si no es major/grand, dormir mas tiempo (no hace nada)
    if (sheetId === 'major' || sheetId === 'grand') {
      // ~12fps (cada 80ms) - suficiente para rotacion fluida, casi 0% GPU
      setTimeout(animate, 80);
    } else {
      setTimeout(animate, 500);
    }
  }
  
  // Verificar que las imagenes existen antes de animar
  function checkSprites() {
    const motoImg = new Image();
    motoImg.onload = () => console.log('[SPRITES] OK moto_sprite.png cargo:', motoImg.width + 'x' + motoImg.height);
    motoImg.onerror = () => console.error('[SPRITES] FALLO cargar moto_sprite.png - verificar que el archivo este en la carpeta');
    motoImg.src = 'moto_sprite.png';
    
    const autoImg = new Image();
    autoImg.onload = () => console.log('[SPRITES] OK auto_sprite.png cargo:', autoImg.width + 'x' + autoImg.height);
    autoImg.onerror = () => console.error('[SPRITES] FALLO cargar auto_sprite.png');
    autoImg.src = 'auto_sprite.png';
    
    // Tambien verificar que los divs existen
    const motoDiv = document.getElementById('motoSprite');
    const autoDiv = document.getElementById('autoSprite');
    console.log('[SPRITES] motoDiv existe:', !!motoDiv);
    console.log('[SPRITES] autoDiv existe:', !!autoDiv);
    
    if (motoDiv) {
      const cs = window.getComputedStyle(motoDiv);
      console.log('[SPRITES] motoDiv computed:');
      console.log('  width:', cs.width, 'height:', cs.height);
      console.log('  background-image:', cs.backgroundImage);
      console.log('  background-size:', cs.backgroundSize);
      console.log('  display:', cs.display);
    }
  }
  
  setTimeout(checkSprites, 1000);
  setTimeout(animate, 1500);
  console.log('[SPRITES] Animador iniciado');
})();
</script>

<!-- ============================================================
     PEDESTAL 3D Three.js (solo el disco/anillos, NO los modelos)
     ============================================================ -->
<script src="js/three.min.js"></script>
<script>
(function() {
  function initPedestal3D(canvasId, color, emissive) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) {
      setTimeout(() => initPedestal3D(canvasId, color, emissive), 300);
      return;
    }
    
    const w = canvas.width;
    const h = canvas.height;
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, w/h, 0.1, 100);
    camera.position.set(0, 0.8, 3.5);     // mas cerca y un poco mas arriba
    camera.lookAt(0, -0.45, 0);            // mira al pedestal (estaba en -0.4)
    
    const renderer = new THREE.WebGLRenderer({ 
      canvas, antialias: true, alpha: true,
      powerPreference: 'default'
    });
    renderer.setSize(w, h, false);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));  // hasta retina x2 para mejor calidad
    renderer.setClearColor(0x000000, 0);
    
    // Luces (iguales que en el generador)
    scene.add(new THREE.AmbientLight(0xffffff, 2.0));
    const keyL = new THREE.DirectionalLight(0xffffff, 2.5);
    keyL.position.set(3, 6, 4);
    scene.add(keyL);
    const fillL = new THREE.DirectionalLight(0xffffff, 1.8);
    fillL.position.set(-4, 2, 2);
    scene.add(fillL);
    
    // Grupo del pedestal (gira)
    const pedestalGroup = new THREE.Group();
    
    // 1. Disco principal gris (CylinderGeometry 1.2/1.25/0.03 - REPLICA EXACTA)
    const pedestalMain = new THREE.Mesh(
      new THREE.CylinderGeometry(1.2, 1.25, 0.03, 48),
      new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6, roughness: 0.3 })
    );
    pedestalMain.position.y = -0.46;
    pedestalGroup.add(pedestalMain);
    
    // 2. Anillo dorado/turquesa (TorusGeometry 1.2/0.025 - REPLICA EXACTA)
    const pedestalRing = new THREE.Mesh(
      new THREE.TorusGeometry(1.2, 0.025, 10, 48),
      new THREE.MeshStandardMaterial({ 
        color: color, metalness: 0.95, roughness: 0.15, 
        emissive: emissive, emissiveIntensity: 0.3 
      })
    );
    pedestalRing.position.y = -0.44;
    pedestalRing.rotation.x = Math.PI/2;
    pedestalGroup.add(pedestalRing);
    
    // 3. Anillo interior brillante (RingGeometry 0.7/0.85 - REPLICA EXACTA)
    const pedestalInnerRing = new THREE.Mesh(
      new THREE.RingGeometry(0.7, 0.85, 48),
      new THREE.MeshBasicMaterial({ 
        color: color, transparent: true, opacity: 0.4, side: THREE.DoubleSide 
      })
    );
    pedestalInnerRing.position.y = -0.42;
    pedestalInnerRing.rotation.x = -Math.PI/2;
    pedestalGroup.add(pedestalInnerRing);
    
    // 4. Disco superior oscuro brillante (CylinderGeometry 1.15/1.15/0.015 - REPLICA EXACTA)
    const pedestalTop = new THREE.Mesh(
      new THREE.CylinderGeometry(1.15, 1.15, 0.015, 48),
      new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 })
    );
    pedestalTop.position.y = -0.43;
    pedestalGroup.add(pedestalTop);
    
    scene.add(pedestalGroup);
    
    console.log('[PEDESTAL 3D] Iniciado:', canvasId);
    
    // Loop - DORMIR cuando no es activo (ahorra GPU)
    function animate() {
      const targetId = canvasId === 'motoPedestal3D' ? 'major' : 'grand';
      const activeSheet = document.querySelector('.sheet.active');
      const isActive = activeSheet && activeSheet.dataset.id === targetId;
      
      if (!isActive) {
        // Dormir 500ms cuando no es activo
        setTimeout(animate, 500);
        return;
      }
      
      // Activo: rotar pedestal lentamente a 30fps
      pedestalGroup.rotation.y += 0.008;
      renderer.render(scene, camera);
      
      setTimeout(() => requestAnimationFrame(animate), 33);
    }
    
    animate();
  }
  
  // Iniciar ambos pedestales con delay
  setTimeout(() => {
    initPedestal3D('motoPedestal3D', 0xffaa00, 0x442200);  // dorado
    initPedestal3D('autoPedestal3D', 0x00e5d4, 0x004442);  // turquesa
  }, 2500);  // delay para que arranque DESPUES de cargar todo lo demas
})();
</script>

<!-- ============================================================
     CONTROL DE MUSICA DE FONDO
     ============================================================ -->
<script>
(function() {
  function initBgMusic() {
    const bgMusic = document.getElementById('bgMusic');
    if (!bgMusic) {
      console.warn('[BG-MUSIC] elemento audio no existe');
      return;
    }
    
    const targetVolume = (window.CASINO_CONFIG && window.CASINO_CONFIG.bgMusicVolume !== undefined) 
      ? window.CASINO_CONFIG.bgMusicVolume 
      : 0.3;
    
    // Si volumen es 0, no reproducir
    if (targetVolume <= 0) {
      console.warn('[BG-MUSIC] Volumen 0 - musica desactivada');
      return;
    }
    
    bgMusic.volume = targetVolume;
    
    // Intentar reproducir (con reintentos por autoplay policy)
    function tryPlay(attempts) {
      bgMusic.play().then(() => {
        console.warn('[BG-MUSIC] Reproduciendo a volumen', targetVolume);
      }).catch(err => {
        if (attempts > 0) {
          setTimeout(() => tryPlay(attempts - 1), 500);
        } else {
          console.error('[BG-MUSIC] No se pudo reproducir:', err.message);
        }
      });
    }
    tryPlay(5);
    
    // Watchdog: cada 2s, revisar si hay modal ganador o promo activo
    // Si los hay -> silenciar. Si no -> volumen normal
    setInterval(() => {
      const isWinner = !!document.querySelector('.winner-modal.showing');
      const isPromo = !!document.querySelector('.promo-video.showing');
      
      if (isWinner || isPromo) {
        // Silenciar suavemente (fade out rapido)
        if (bgMusic.volume > 0.01) {
          bgMusic.volume = Math.max(0, bgMusic.volume - 0.1);
        }
      } else {
        // Subir suavemente al volumen normal (fade in)
        if (bgMusic.volume < targetVolume) {
          bgMusic.volume = Math.min(targetVolume, bgMusic.volume + 0.05);
        }
      }
      
      // Si por alguna razon se pauso, reanudar
      if (bgMusic.paused && !isWinner && !isPromo) {
        bgMusic.play().catch(() => {});
      }
    }, 2000);
  }
  
  // Esperar a que cargue todo
  if (document.readyState === 'complete') {
    setTimeout(initBgMusic, 1500);
  } else {
    window.addEventListener('load', () => setTimeout(initBgMusic, 1500));
  }
})();
</script>

<!-- ============================================================
     CONTROL DEL HUD SUPERIOR (mini odometros durante promo)
     ============================================================ -->
<script>
(function() {
  const hud = document.getElementById('promoHud');
  const bottomDeco = document.getElementById('promoBottomDeco');
  const miniReels = document.getElementById('promoMiniReels');
  const minorReels = document.getElementById('promoMinorReels');
  
  if (!hud || !miniReels || !minorReels) return;
  
  // Leer valor EXACTO de los reels del DOM (lo que ve el usuario)
  function getOdometerValue(sheetId) {
    const sheet = document.querySelector('.sheet[data-id="' + sheetId + '"]');
    if (!sheet) return null;
    const reels = sheet.querySelectorAll('.reel-strip');
    if (reels.length !== 7) return null;
    
    let digits = '';
    for (let i = 0; i < 7; i++) {
      digits += (reels[i].dataset.digit || '0');
    }
    if (digits.length === 7) {
      const enteros = digits.substring(0, 2) + ',' + digits.substring(2, 5);
      const decimales = digits.substring(5);
      return 'S/. ' + enteros + '.' + decimales;
    }
    return 'S/. 0,000.00';
  }
  
  const cornerLeft = document.querySelector('.promo-corner-left');
  const cornerRight = document.querySelector('.promo-corner-right');
  const cornerTopLeft = document.querySelector('.promo-corner-top-left');
  const cornerTopRight = document.querySelector('.promo-corner-top-right');
  
  setInterval(() => {
    const promoActive = !!document.querySelector('.promo-video.showing');
    
    if (promoActive) {
      if (!hud.classList.contains('showing')) hud.classList.add('showing');
      if (bottomDeco && !bottomDeco.classList.contains('showing')) bottomDeco.classList.add('showing');
      if (cornerLeft && !cornerLeft.classList.contains('showing')) cornerLeft.classList.add('showing');
      if (cornerRight && !cornerRight.classList.contains('showing')) cornerRight.classList.add('showing');
      if (cornerTopLeft && !cornerTopLeft.classList.contains('showing')) cornerTopLeft.classList.add('showing');
      if (cornerTopRight && !cornerTopRight.classList.contains('showing')) cornerTopRight.classList.add('showing');
      
      const miniValue = getOdometerValue('mini');
      const minorValue = getOdometerValue('minor');
      if (miniValue) miniReels.textContent = miniValue;
      if (minorValue) minorReels.textContent = minorValue;
    } else {
      if (hud.classList.contains('showing')) hud.classList.remove('showing');
      if (bottomDeco && bottomDeco.classList.contains('showing')) bottomDeco.classList.remove('showing');
      if (cornerLeft && cornerLeft.classList.contains('showing')) cornerLeft.classList.remove('showing');
      if (cornerRight && cornerRight.classList.contains('showing')) cornerRight.classList.remove('showing');
      if (cornerTopLeft && cornerTopLeft.classList.contains('showing')) cornerTopLeft.classList.remove('showing');
      if (cornerTopRight && cornerTopRight.classList.contains('showing')) cornerTopRight.classList.remove('showing');
    }
  }, 150);
})();
</script>
