* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0004; overflow: hidden; font-family: 'Courier New', monospace; }

.dashboard {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  overflow: hidden;
  position: relative;
  z-index: 2;
  opacity: 0;
  transition: opacity 0.6s ease-in;
}
.dashboard.ready { opacity: 1; }

.shield-box {
  width: 100%;
  height: 100%;
  position: relative;
  container-type: size;
  container-name: shield;
}

.shield-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

.bg-video {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  opacity: 0;  /* todos arrancan invisibles */
  pointer-events: none;
  transition: opacity 1s ease;
}

/* Solo el video con clase .video-active se ve */
.bg-video.video-active {
  opacity: 0.4;
}

/* CARRUSEL DE HOJAS */
.sheets-wrapper {
  position: absolute;
  inset: 0;
  z-index: 2;
  overflow: hidden;
  perspective: 1200px;
  perspective-origin: center center;
}

.sheet {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-evenly;
  padding: 9% 14% 9%;
  transition: transform 1s cubic-bezier(0.6, 0, 0.4, 1), opacity 0.9s ease;
  transform-origin: center center;
  perspective: 1200px;
  will-change: transform, opacity;
  min-width: 0;
  box-sizing: border-box;
}

/* Hoja activa: tamaño normal, opaca */
.sheet.active {
  transform: scale(1) translateZ(0);
  opacity: 1;
  z-index: 2;
}

/* Hoja que sale: viene HACIA ADELANTE (zoom in + fade) */
.sheet.exit-front {
  transform: scale(2.5) translateZ(0);
  opacity: 0;
  z-index: 3;
}

/* Hoja que entra desde atras: empieza pequeña/invisible */
.sheet.enter-from-back {
  transform: scale(0.3) translateZ(0);
  opacity: 0;
  z-index: 1;
}

/* ANIMACIONES */
@keyframes bulbBlink {0%,100%{opacity:1;}50%{opacity:.55;}}
@keyframes bulbBlinkAlt {0%,100%{opacity:.55;}50%{opacity:1;}}
@keyframes scanRed {0%{transform:translateY(0);}100%{transform:translateY(80vh);}}
@keyframes blink {0%,49%,100%{opacity:1;}50%,99%{opacity:.25;}}
@keyframes labelGlowRed {0%,100%{text-shadow:0 0 6px #ffd600,0 0 12px #ff8800,0 0 22px #ff5500;}50%{text-shadow:0 0 10px #ffd600,0 0 22px #ff8800,0 0 38px #ff5500;}}
@keyframes labelGlowGreen {0%,100%{text-shadow:0 0 6px #00ff66,0 0 12px #00cc44,0 0 22px #00aa33;}50%{text-shadow:0 0 10px #00ff66,0 0 22px #00cc44,0 0 38px #00aa33;}}
@keyframes spark {0%,100%{opacity:0;transform:scale(.5);}50%{opacity:1;transform:scale(1.3);}}
@keyframes heatPulse {0%,100%{box-shadow:0 0 12px var(--theme-accent),inset 0 0 8px var(--theme-accent);}50%{box-shadow:0 0 24px #ffd600,inset 0 0 14px #ffd600;}}
@keyframes heatBubble {0%{transform:translateY(0) scale(1);opacity:.9;}100%{transform:translateY(-180px) scale(.3);opacity:0;}}
@keyframes minorPulse {0%,100%{filter:drop-shadow(0 0 8px #ffd700) drop-shadow(0 0 18px #ff8800) drop-shadow(0 0 30px #ff4400);}50%{filter:drop-shadow(0 0 14px #ffd700) drop-shadow(0 0 30px #ff8800) drop-shadow(0 0 50px #ff4400);}}
/* @keyframes odoStep eliminado - JS controla los reels */

/* TITULO */
.sheet-title {
  font-family: 'BudmoJiggler', sans-serif;
  font-size: 10cqw;
  letter-spacing: 0.4cqw;
  line-height: 0.95;
  color: #ffd700;
  animation: minorPulse 1.8s infinite ease-in-out;
  margin: 0;
  text-align: center;
}

.sheet-subtitle {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.4cqw;
  font-weight: 700;
  letter-spacing: 0.6cqw;
  color: #ffaa00;
  margin-top: 0.6cqh;
  animation: labelGlowRed 1.6s infinite ease-in-out;
}

/* sheet de MINI: subtitle verde */
.sheet[data-theme="green"] .sheet-subtitle {
  animation: labelGlowGreen 1.6s infinite ease-in-out;
  color: #66ffaa;
}

.scan-line {
  position: absolute;
  left: 8%; right: 8%;
  height: 2px;
  background: linear-gradient(90deg,transparent,var(--theme-accent),#ffd600,var(--theme-accent),transparent);
  opacity: .5;
  animation: scanRed 5s linear infinite;
  pointer-events: none;
  top: 15%;
}

.spark-dot {
  position: absolute;
  width: 6px; height: 6px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 8px #fff, 0 0 16px #ffd600, 0 0 22px #ff8800;
  animation: spark 1.6s infinite;
}
.blink { animation: blink 1s infinite; }

/* MARCO MONTO */
.amount-frame {
  background: #000;
  border: 0.5cqw solid;
  border-image: linear-gradient(135deg,#ffd600 0%,#ff8800 25%,#b8860b 50%,#ff8800 75%,#ffd600 100%) 1;
  border-radius: 10px;
  padding: 2cqh 2cqw;
  box-shadow: inset 0 0 40px rgba(255,80,0,.4), 0 0 25px rgba(255,0,51,.6), inset 0 0 0 2px #1a0000;
  margin-top: 1cqh;
  width: 100%;
  display: flex;
  justify-content: center;
}

.reel-row { display: flex; align-items: center; justify-content: center; gap: 4px; }

.reel-digit {
  display: inline-block;
  width: 6cqw;
  height: 11cqh;
  background: linear-gradient(180deg, #000 0%, #0a0000 50%, #000 100%);
  border: 1px solid rgba(255,180,0,.4);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  box-shadow:
    inset 0 4px 10px rgba(0,0,0,.95),
    inset 0 -4px 10px rgba(0,0,0,.95),
    inset 0 0 6px rgba(0,0,0,1);
  vertical-align: middle;
}
.reel-digit::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,215,0,0.25), transparent);
  pointer-events: none;
  z-index: 3;
}
.reel-strip {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 4.5cqw;
  line-height: 11cqh;
  text-align: center;
  color: #ffd700;
  text-shadow: 0 0 4px #fff8a0, 0 0 10px #ffaa00, 0 0 18px #ff6600;
}
.reel-strip span { height: 11cqh; display: block; }

/* Animaciones de reel deshabilitadas - JS controla todo */
.r-1, .r-2, .r-3, .r-4, .r-5, .r-6 { animation: none !important; }
.reel-strip { animation: none !important; transition: transform 0.4s ease-out; }

.reel-sep {
  font-family: 'Orbitron', sans-serif;
  font-size: 4.8cqw;
  font-weight: 900;
  line-height: 1;
  color: #ffd700;
  text-shadow: 0 0 6px #fff8a0, 0 0 14px #ffaa00, 0 0 22px #ff6600;
  padding: 0 0.4cqw;
  align-self: center;
  margin-bottom: 1.5cqh;
}

.reel-prefix {
  font-family: 'Orbitron', sans-serif;
  font-size: 4cqw;
  font-weight: 900;
  color: #ffaa00;
  text-shadow: 0 0 6px #ff8800, 0 0 14px #ff5500;
  padding-right: 1.2cqw;
  align-self: center;
}

/* BOTTOM ROW */
.bottom-row {
  margin-top: 1.5cqh;
  display: grid;
  grid-template-columns: 11cqw 1fr;
  gap: 1.5cqw;
  width: 100%;
  align-items: stretch;
}

.thermometer {
  background: #000;
  border: 2px solid var(--theme-accent);
  border-radius: 10px;
  padding: 1.2cqh 0.8cqw 1.5cqh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  animation: heatPulse 1.4s infinite;
  min-height: 22cqh;
}
.thermo-label {
  font-size: 1.1cqw;
  color: #ffd600;
  letter-spacing: 0.2cqw;
  font-weight: bold;
  font-family: 'Orbitron', sans-serif;
  margin-bottom: 0.6cqh;
}
.thermo-tube-wrap {
  flex: 1;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  position: relative;
  width: 100%;
  margin-bottom: 4px;
}
.thermo-tube {
  position: relative;
  width: 1.4cqw;
  min-width: 8px;
  height: 100%;
  background: rgba(255,0,51,.1);
  border: 1px solid rgba(255,0,51,.6);
  border-radius: 7px 7px 0 0;
  border-bottom: none;
  overflow: hidden;
}
.thermo-fill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top,#ffd600 0%,#ff8800 50%,#ff0033 100%);
  box-shadow: 0 0 10px #ff0033, inset 0 0 4px rgba(255,255,255,0.3);
}
.thermo-bulb {
  width: 2.6cqw;
  height: 2.6cqw;
  min-width: 14px;
  min-height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ff6688 0%, #ff0033 60%, #aa0022 100%);
  box-shadow: 0 0 16px #ff0033, inset 0 0 8px rgba(255,255,255,0.3);
  border: 1px solid #ffd600;
  margin-top: -1px;
  position: relative;
  z-index: 2;
}
.thermo-value {
  margin-top: 0.6cqh;
  font-size: 1.7cqw;
  color: #ff0033;
  font-weight: 900;
  font-family: 'Orbitron', sans-serif;
  text-shadow: 0 0 8px #ff0033, 0 0 14px #ff5500;
}
.bubble {
  position: absolute;
  width: 4px; height: 4px;
  background: #ffd600;
  border-radius: 50%;
  box-shadow: 0 0 6px #ffd600;
  animation: heatBubble 2.4s linear infinite;
}

.stat-card {
  background: #000;
  border: 1px solid #ffd600;
  border-radius: 6px;
  padding: 0.8cqh 0.6cqw;
  text-align: center;
}
.stat-label { font-size: 1.1cqw; color: #ffd600; letter-spacing: 0.2cqw; font-family: 'Orbitron', sans-serif; }
.stat-value { font-size: 1.8cqw; font-weight: 900; font-family: 'Orbitron', sans-serif; }

.progress-block {
  background: #000;
  border: 1px solid var(--theme-accent);
  border-radius: 6px;
  padding: 6px 12px;
}

/* (bloque ULTRA-WIDE 1.6 antiguo eliminado, reemplazado por el container 1.4 unificado) */

/* PRELOADER */
.preloader {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  background: #0a0004;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity 0.5s ease-out;
}
.preloader.hide { opacity: 0; pointer-events: none; }
.preloader-spinner {
  width: 60px; height: 60px;
  border: 4px solid rgba(255,215,0,0.2);
  border-top-color: #ffd700;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
  box-shadow: 0 0 20px rgba(255,215,0,0.4);
}
.preloader-text {
  font-family: 'Courier New', monospace;
  color: #ffaa00;
  font-size: 12px;
  letter-spacing: 4px;
  text-shadow: 0 0 8px #ff8800;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* empuja al fondo */
}


/* ============================================================
   TEMA AMARILLO (MAJOR) - subtitle
   ============================================================ */
.sheet[data-theme="yellow"] .sheet-subtitle {
  animation: labelGlowYellow 1.6s infinite ease-in-out;
  color: #ffd700;
}
@keyframes labelGlowYellow {
  0%,100% { text-shadow: 0 0 6px #ffcc00, 0 0 12px #ff8800, 0 0 22px #ffaa00; }
  50%     { text-shadow: 0 0 10px #ffcc00, 0 0 22px #ff8800, 0 0 38px #ffaa00; }
}

/* ============================================================
   TEMA TURQUESA (GRAND) - subtitle
   ============================================================ */
.sheet[data-theme="turquoise"] .sheet-subtitle {
  animation: labelGlowTurquoise 1.6s infinite ease-in-out;
  color: #00e5d4;
}
@keyframes labelGlowTurquoise {
  0%,100% { text-shadow: 0 0 6px #00e5d4, 0 0 12px #00aa99, 0 0 22px #006666; }
  50%     { text-shadow: 0 0 10px #00e5d4, 0 0 22px #00aa99, 0 0 38px #006666; }
}

/* ============================================================
   ANIMACIONES AGUJAS
   ============================================================ */
.gauge-needle {
  transform-box: view-box;
  transform-origin: 0 0;
  transform: rotate(-130deg); /* angulo inicial: minimo */
  transition: transform 0.05s linear; /* movimiento suave entre frames */
}

/* ============================================================
   LAYOUT VEHICULO (MAJOR/GRAND)
   - Modo NORMAL (pantalla normal): vertical apilado como antes
   - Modo WIDE (ratio > 1.4): 3 columnas con panel central curveado
   ============================================================ */

/* Hojas vehiculo: gap controlado en lugar de space-evenly */
.sheet[data-id="major"],
.sheet[data-id="grand"] {
  justify-content: flex-start;
  gap: 0.5cqh;
}
.sheet[data-id="major"] .sheet-title,
.sheet[data-id="grand"] .sheet-title {
  margin-top: 0;
}

/* === LAYOUT NORMAL (pantalla cuadrada o vertical) === */
.vehicle-layout {
  width: 100%;
  max-width: 100%;
  flex: 1;
  min-height: 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1cqh;
  margin-top: 0.5cqh;
  box-sizing: border-box;
}

.vehicle-side-left,
.vehicle-side-right {
  display: flex;
  flex-direction: column;
  gap: 1cqh;
  width: 100%;
}













/* === GAUGES === */
.moto-gauge {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: visible;
  /* Scale para que el circulo sea visiblemente mas grande */
  transform: scale(4.2);
  transform-origin: center center;
}
.moto-gauge svg {
  width: 100%;
  height: 100%;
  display: block;
}
.moto-gauge-label {
  position: absolute;
  bottom: 22%;
  left: 0; right: 0;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(3px, 0.32cqw, 6px);
  letter-spacing: 0.05cqw;
  color: #ffaa00;
}
.moto-gauge-value {
  position: absolute;
  top: 60%;
  left: 25%;
  right: 25%;
  text-align: center;
  transform: translateY(-50%);
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(4px, 0.52cqw, 8px);
  color: #ffd700;
  text-shadow: 0 0 4px #fff8a0, 0 0 10px #ffaa00;
  white-space: nowrap;
  overflow: hidden;
}

/* === FUEL (combustible) === */
.moto-fuel {
  background: #000;
  border: 2px solid #ffd700;
  border-radius: 10px;
  padding: 0.8cqh 0.6cqw;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-shadow: inset 0 0 16px rgba(255,170,0,0.3), 0 0 10px rgba(255,170,0,0.4);
  width: 100%;
  min-height: 14cqh;
  flex: 1;
}
.moto-fuel-label {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(8px, 0.9cqw, 13px);
  letter-spacing: 0.15cqw;
  color: #ffaa00;
  text-align: center;
  margin-bottom: 0.5cqh;
  flex-shrink: 0;
}
.moto-fuel-bars {
  display: flex;
  flex-direction: column-reverse;
  gap: 0.3cqh;
  flex: 1;
  min-height: 0;
}
.moto-fuel-bar {
  background: #222;
  border-radius: 2px;
  flex: 1;
  min-height: 3px;
}
.moto-fuel-bar.on {
  background: linear-gradient(90deg, #ff4400 0%, #ffaa00 50%, #ffd700 100%);
  box-shadow: 0 0 4px #ffaa00;
}
.moto-fuel-bar.on.car {
  background: linear-gradient(90deg, #00aa99 0%, #00e5d4 50%, #00ffe5 100%);
  box-shadow: 0 0 4px #00e5d4;
}
.moto-fuel-value {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(11px, 1.3cqw, 18px);
  font-weight: 900;
  color: #ffd700;
  text-align: center;
  margin-top: 0.4cqh;
  text-shadow: 0 0 6px #ffaa00;
  flex-shrink: 0;
}

/* Fuel en GRAND: turquesa */
.moto-fuel.car {
  border-color: #00e5d4;
  box-shadow: inset 0 0 16px rgba(0,229,212,0.3), 0 0 10px rgba(0,229,212,0.4);
}
.moto-fuel.car .moto-fuel-label { color: #00e5d4; }
.moto-fuel.car .moto-fuel-value { color: #00ffe5; text-shadow: 0 0 6px #00e5d4; }

/* === GAUGES en GRAND: turquesa === */
.moto-gauge-value.car {
  color: #00ffe5;
  text-shadow: 0 0 4px #cffff8, 0 0 10px #00e5d4, 0 0 18px #00aa99;
}
.moto-gauge-label.car { color: #00e5d4; }

/* === MARCHA GIGANTE (MAJOR) === */
.moto-gear-big {
  background: #000;
  border: 2px solid #ffd700;
  border-radius: 10px;
  padding: 0.5cqh 0.4cqw;
  text-align: center;
  box-shadow: inset 0 0 16px rgba(255,170,0,0.3), 0 0 10px rgba(255,170,0,0.4);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 100%;
  flex: 1;
  min-height: 14cqh;
}
.moto-gear-label {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(8px, 0.9cqw, 14px);
  letter-spacing: 0.15cqw;
  color: #ffaa00;
  margin-bottom: 0.3cqh;
  flex-shrink: 0;
}
.moto-gear-number {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(30px, 11cqh, 110px);
  line-height: 1;
  color: #ffd700;
  text-shadow:
    0 0 6px #fff,
    0 0 14px #ffd700,
    0 0 26px #ff8800,
    0 0 40px #ff4400;
}

/* === BATERIA Y ODOMETRO (GRAND) === */
.car-battery, .car-odometer {
  background: #000;
  border: 2px solid #00e5d4;
  border-radius: 10px;
  padding: 0.5cqh 0.4cqw;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: inset 0 0 16px rgba(0,229,212,0.3), 0 0 10px rgba(0,229,212,0.4);
  min-height: 6cqh;
}
.car-battery-label, .car-odo-label {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(8px, 0.8cqw, 13px);
  letter-spacing: 0.12cqw;
  color: #00e5d4;
  margin-bottom: 0.3cqh;
}
.car-battery-icon {
  width: 80%;
  height: 22%;
  background: rgba(0, 229, 212, 0.1);
  border: 2px solid #00e5d4;
  border-radius: 4px;
  position: relative;
  margin-bottom: 0.3cqh;
  min-height: 8px;
}
.car-battery-icon::after {
  content: '';
  position: absolute;
  right: -5px;
  top: 25%;
  width: 4px;
  height: 50%;
  background: #00e5d4;
  border-radius: 0 2px 2px 0;
}
.car-battery-fill {
  height: 100%;
  background: linear-gradient(90deg, #00aa99 0%, #00e5d4 50%, #00ffe5 100%);
  border-radius: 2px;
  box-shadow: 0 0 6px #00e5d4;
}
.car-battery-value {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(11px, 1.1cqw, 18px);
  font-weight: 900;
  color: #00ffe5;
  text-shadow: 0 0 6px #00e5d4;
}
.car-odo-value {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(13px, 1.5cqw, 22px);
  font-weight: 900;
  color: #00ffe5;
  text-shadow: 0 0 6px #00e5d4, 0 0 14px #00aa99;
}

/* ============================================================
   LAYOUT WIDE (ratio > 1.4): 3 columnas
   ============================================================ */
@container shield (min-aspect-ratio: 1.4) {
  .sheet[data-id="major"] .vehicle-layout,
  .sheet[data-id="grand"] .vehicle-layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 5fr) minmax(0, 1fr);
    grid-template-rows: 1fr auto;
    gap: 1cqw 1cqw;
    align-items: stretch;
    flex: 1;
    min-height: 0;
    width: 100%;
  }
  /* Fila 1: las 3 columnas */
  .sheet[data-id="major"] .vehicle-side-left,
  .sheet[data-id="grand"] .vehicle-side-left { grid-column: 1; grid-row: 1; }
  .sheet[data-id="major"] .cluster,
  .sheet[data-id="grand"] .cluster { grid-column: 2; grid-row: 1; }
    /* GRAND: layout con auto F1 arriba, bateria + odometer al fondo (juntos) */
  .sheet[data-id="grand"] .vehicle-side-right {
    position: relative;                 /* para anclar sprite-wrapper absolute */
    align-self: stretch;
    justify-content: flex-start;
    padding-top: 35cqh;                 /* reserva espacio para el sprite absoluto - battery/odo empiezan abajo */
    padding-bottom: 2cqh;
    box-sizing: border-box;
    max-height: 100%;
    overflow: visible;
    display: flex;
    flex-direction: column;
  }
  .sheet[data-id="grand"] .vehicle-side-right .auto-sparks,
  .sheet[data-id="grand"] .vehicle-side-right .auto-wrapper {
    flex: 0 0 auto;
  }
  .sheet[data-id="grand"] .vehicle-side-right .car-battery {
    flex: 0 0 auto;
    margin-top: auto;       /* empuja bateria (y todo lo que viene despues) hacia abajo */
    min-height: 8cqh;
    padding: 1cqh 0.6cqw;
    margin-bottom: 1cqh;    /* separa de odometer */
  }
  .sheet[data-id="grand"] .vehicle-side-right .car-odometer {
    flex: 0 0 auto;
    min-height: 8cqh;
    padding: 1cqh 0.6cqw;
  }
  /* MAJOR: columna del GEAR con moto encima */
  .sheet[data-id="major"] .vehicle-side-right {
    position: relative;                 /* para anclar sprite-wrapper absolute */
    align-self: stretch;
    justify-content: flex-start;
    padding-top: 35cqh;                 /* reserva espacio para sprite absoluto - gear queda abajo */
    padding-bottom: 2cqh;
    box-sizing: border-box;
    max-height: 100%;
    overflow: visible;
    display: flex;
    flex-direction: column;
  }
  .sheet[data-id="major"] .vehicle-side-right .moto-sparks,
  .sheet[data-id="major"] .vehicle-side-right .moto-wrapper {
    flex: 0 0 auto;
  }
  .sheet[data-id="major"] .vehicle-side-right .moto-gear-big {
    flex: 0 0 auto;
    margin-top: auto;             /* GEAR al fondo */
  }
  /* Fila 2: barra de progreso solo en la columna 2 (debajo del cluster) */
  .sheet[data-id="major"] .vehicle-progress-bottom,
  .sheet[data-id="grand"] .vehicle-progress-bottom {
    grid-column: 2;
    grid-row: 2;
    width: 100%;
    margin-top: 0;
    padding: 0;
  }

  .sheet[data-id="major"] .vehicle-side-left,
  .sheet[data-id="major"] .vehicle-side-right,
  .sheet[data-id="grand"] .vehicle-side-left,
  .sheet[data-id="grand"] .vehicle-side-right {
    height: 100%;
    justify-content: flex-start;
  }

  .sheet[data-id="major"] .vehicle-panel,
  .sheet[data-id="grand"] 

  /* Termometro en wide: ocupa la mitad superior aprox */
  .sheet[data-id="major"] .vehicle-side-left .thermometer,
  .sheet[data-id="grand"] .vehicle-side-left .thermometer {
    flex: 1.2;
    min-height: 0;
  }
  .sheet[data-id="major"] .vehicle-side-left .moto-fuel,
  .sheet[data-id="grand"] .vehicle-side-left .moto-fuel {
    flex: 1;
    min-height: 0;
  }

  /* En wide: el spinner toma altura natural y el gear-big toma el resto */
  .sheet[data-id="major"] .vehicle-side-right .moto-gear-big {
    flex: 1;
    min-height: 0;
  }
  /* GRAND: bateria y odometer mantienen su tamaño natural (no flex:1) */

  /* Gauges con altura limitada */
  .sheet[data-id="major"] .vehicle-gauges,
  .sheet[data-id="grand"] 

  /* Padding lateral reducido en wide para hojas vehiculo (mas espacio disponible) */
  .sheet[data-id="major"],
  .sheet[data-id="grand"] {
    padding: 9% 11% 9%;
  }
  /* WIDE: titulo y subtitle absolutos centrados, vehicle-layout ocupa todo el alto */
  .sheet[data-id="major"] .sheet-title,
  .sheet[data-id="grand"] .sheet-title {
    position: absolute;
    top: 14%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    margin-top: 0;
    pointer-events: none;
  }
  .sheet[data-id="major"] .sheet-subtitle,
  .sheet[data-id="grand"] .sheet-subtitle {
    position: absolute;
    top: calc(14% + 11cqw);   /* bajado: mas espacio respecto al titulo */
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    margin-top: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  /* El vehicle-layout en wide: ocupa todo el alto del sheet */
  .sheet[data-id="major"] .vehicle-layout,
  .sheet[data-id="grand"] .vehicle-layout {
    margin-top: 0;
    height: 100%;
  }

  /* Columna izquierda: termo+fuel desde arriba hasta donde termina el cluster */
  .sheet[data-id="major"] .vehicle-side-left,
  .sheet[data-id="grand"] .vehicle-side-left {
    align-self: stretch;
    justify-content: flex-start;
  }
  /* (regla vieja eliminada - ahora controlada arriba) */

  /* El cluster respeta espacio para el titulo arriba: margin-top */
  .sheet[data-id="major"] .cluster,
  .sheet[data-id="grand"] .cluster {
    margin-top: 22cqh;  /* mas espacio para subtitle bajado */
  }


/* (overflow hidden eliminado, no debe cortar contenido) */
}

/* ============================================================
   CLUSTER (tablero real moto/auto)
   - SVG de fondo dibuja la forma del cluster
   - Encima: KPIs izq, Gauges centro, KPIs der
   - Debajo: barra de progreso del jackpot
   ============================================================ */
.cluster {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding: 3% 4%;
  box-sizing: border-box;
}
.cluster-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}
.cluster-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: minmax(0, 1.4fr) minmax(0, 2fr) minmax(0, 1.4fr);
  gap: 4cqw;
  align-items: center;
  flex: 1;
  min-height: 0;
  padding: 0 2cqw;
}
.cluster-gauges {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7cqw;
  height: 100%;
  align-items: center;
  justify-items: center;
  min-width: 0;
}
.cluster-kpi-col {
  display: flex;
  flex-direction: column;
  gap: 1.5cqh;             /* mas separacion vertical entre KPIs */
  height: 100%;
  justify-content: center;
  min-width: 0;
  padding: 0 0.5cqw;
}
.cluster-kpi {
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(255,215,0,0.45);
  border-radius: 6px;
  padding: 1cqh 0.5cqw;
  text-align: center;
  min-width: 0;
  width: 100%;
  box-sizing: border-box;
  overflow: visible;
}
.cluster-car .cluster-kpi {
  border-color: rgba(0,229,212,0.45);
}
.cluster-kpi-label {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(9px, 1cqw, 14px);
  letter-spacing: 0.08cqw;          /* menos letter-spacing para que quepa */
  color: #ffaa00;
  white-space: nowrap;               /* NO truncar */
  overflow: visible;
}
.cluster-car .cluster-kpi-label { color: #00e5d4; }
.cluster-kpi-value {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(16px, 1.9cqw, 28px);
  font-weight: 900;
  margin-top: 0.3cqh;
}
.cluster-progress {
  position: relative;
  z-index: 1;
  width: 100%;
  margin-top: 0.6cqh;
  padding: 0 2cqw;
  box-sizing: border-box;
}
.cluster-progress-header {
  display: flex;
  justify-content: space-between;
  font-size: clamp(8px, 1cqw, 13px);
  letter-spacing: 0.18cqw;
  margin-bottom: 0.4cqh;
  font-family: 'Orbitron', sans-serif;
}
.cluster-progress-track {
  height: 1cqh;
  min-height: 7px;
  background: rgba(255,255,255,0.05);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.2);
}
.cluster-progress-fill {
  height: 100%;
  border-radius: 5px;
}

/* Barra de progreso ABAJO del cluster (MAJOR/GRAND) */
.vehicle-progress-bottom {
  width: 100%;
  margin-top: 0.6cqh;
  padding: 0 2cqw;
  box-sizing: border-box;
  flex-shrink: 0;
  /* Por defecto (modo normal apilado): full ancho */
  grid-column: 1 / -1;
}

/* ============================================================
   KPIs en MINI / MINOR: cinta de eslabones (V2-C concavo)
   ============================================================ */
.kpis-chain-wrap {
  position: relative;

  /* la altura se controla con padding-top % (aspect ratio 800x120 -> 15%) */
  padding-top: 15%;

.kpis-chain-svg {

  position: absolute !important;

/* ============================================================
   VIDEOS PROMO FULLSCREEN con efecto VHS
   ============================================================ */
.promo-video {
  position: fixed;
  top: 2%;
  left: 2%;
  width: 96%;
  height: 96%;
  object-fit: cover;
  z-index: 999;
  /* IMPORTANTE: no usar display:none para que el navegador no duerma el video */
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
  border: 4px solid #ffd700;
  border-radius: 8px;
  box-shadow: 0 0 60px rgba(255,215,0,0.6),
              0 0 120px rgba(255,170,0,0.4),
              inset 0 0 30px rgba(0,0,0,0.5);
}
.promo-video.showing {
  opacity: 1 !important;
  visibility: visible !important;
  animation: vhsAppear 1s ease-out forwards;
}
.promo-video.hiding {
  animation: vhsDisappear 0.6s ease-in forwards;
}

/* Capa overlay que cubre el video con efecto VHS scanlines */
.promo-vhs-overlay {
  position: fixed;
  top: 2%;
  left: 2%;
  width: 96%;
  height: 96%;
  z-index: 1000;
  display: none;
  pointer-events: none;
  background: 
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.15) 0px,
      rgba(0,0,0,0.15) 1px,
      transparent 1px,
      transparent 3px
    );
  border-radius: 8px;
  mix-blend-mode: multiply;
}
.promo-vhs-overlay.showing {
  display: block;
  animation: vhsScanlines 2s linear infinite;
}

/* Capa de glitch (color shift, ruido) */
.promo-glitch {
  position: fixed;
  top: 5%;
  left: 5%;
  width: 90%;
  height: 90%;
  z-index: 1001;
  display: none;
  pointer-events: none;
  border-radius: 8px;
}
.promo-glitch.showing {
  display: block;
  animation: vhsGlitch 0.6s steps(8) 1;
}

/* Animacion liviana: solo opacity + transform (no filter) para no saturar la GPU */
@keyframes vhsAppear {
  0%   { opacity: 0; transform: scale(0.95); }
  20%  { opacity: 1; transform: scale(1.02); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes vhsDisappear {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.95); }
}

@keyframes vhsScanlines {
  0% { background-position: 0 0; }
  100% { background-position: 0 4px; }
}

@keyframes vhsGlitch {
  0%, 100% { 
    background: linear-gradient(90deg, transparent 0%, transparent 100%);
    transform: translateX(0);
  }
  20% { 
    background: linear-gradient(90deg, rgba(255,0,0,0.3) 0%, transparent 30%, rgba(0,255,255,0.3) 100%);
    transform: translateX(-3px);
  }
  40% { 
    background: linear-gradient(90deg, transparent 0%, rgba(255,0,255,0.2) 50%, transparent 100%);
    transform: translateX(2px);
  }
  60% {
    background: linear-gradient(0deg, transparent 0%, rgba(255,255,255,0.4) 50%, transparent 100%);
    transform: translateX(-1px);
  }
}

/* Cuando useTestData=false, pausar animaciones CSS - JS controla via transform */
body.production-mode .reel-strip {

}

/* ============================================================
   SPRITES (solo background-image; layout y transform los pone el .sprite-wrapper)
   ============================================================ */
.moto-sprite {
  background-image: url('moto_sprite.png');
}
.auto-sprite {
  background-image: url('auto_sprite.png');
}

/* ============================================================
   WRAPPER sprite + canvas pedestal 3D Three.js (REPLICA del original)
   ============================================================ */
.sprite-wrapper {
  /* OVERLAY absoluto: NO empuja el flow de la columna */
  position: absolute !important;
  top: 0 !important;
  left: 50% !important;
  width: 220% !important;              /* MAS grande que la columna - se sale visualmente */
  aspect-ratio: 1 / 1 !important;
  /* Centrar el wrapper horizontalmente (left:50% + translateX -50%) */
  transform: translateX(-50%) !important;
  margin: 0 !important;
  display: block !important;
  pointer-events: none;
  z-index: 5;
  max-width: none !important;
}

/* Canvas del pedestal 3D - va DETRAS del sprite, abajo del wrapper */
.sprite-wrapper .pedestal-3d {
  position: absolute !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 0 !important;
  width: 100% !important;
  height: 100% !important;
  z-index: 1;
  pointer-events: none;
  background: transparent;
}

/* Sprite ENCIMA del pedestal - base de posicion (sin transform) */
.sprite-wrapper .moto-sprite,
.sprite-wrapper .auto-sprite {
  position: absolute !important;
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  max-width: none !important;
  min-width: 0 !important;
  z-index: 3;
  background-size: 600% 600%;
  background-repeat: no-repeat;
}

/* ============================================================
   SPRITES - subir verticalmente para quedar SOBRE el pedestal
   El pedestal canvas dibuja el disco en la parte INFERIOR del wrapper.
   Los sprites necesitan subir para que las ruedas asienten en el disco.
   ============================================================ */
.sprite-wrapper.auto-wrapper .auto-sprite {
  transform: translateY(-8%) !important;
  transform-origin: center center !important;
}

.sprite-wrapper.moto-wrapper .moto-sprite {
  transform: translateY(-15%) !important;
  transform-origin: center center !important;
}

/* ============================================================
   BORDE NEON PULSANTE - sobre el .amount-frame (marco dorado)
   ============================================================ */
.amount-frame {
  position: relative;  /* importante para que el SVG absoluto se posicione bien */
}

.amount-frame-neon {
  position: absolute;
  /* SVG cubre exactamente el contorno externo del borde dorado.
     Como stroke-width: 8 se dibuja CENTRADO sobre el path, queda
     4px afuera + 4px adentro = directamente SOBRE el grosor del borde dorado */
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 3;                   /* z-index mayor que el borde dorado */
  overflow: visible;
}

.amount-frame-neon .neon-pulse {
  width: 100%;
  height: 100%;
  /* stroke-width = ancho del borde dorado del frame (0.5cqw) para que el haz quede SOBRE el borde */
  stroke-width: 0.5cqw;
  stroke-dasharray: 240 1880;
  stroke-dashoffset: 0;
  animation: neonTravel 3.5s linear infinite;
  opacity: 1;
  filter: drop-shadow(0 0 6px #ffd700) drop-shadow(0 0 14px #ffaa00) drop-shadow(0 0 24px #ff8800);
}

/* Capa de glow exterior - mas ancho, blur ligero */
.amount-frame-neon .neon-pulse-glow {
  width: 100%;
  height: 100%;
  stroke-width: 1.2cqw;
  stroke-dasharray: 240 1880;
  stroke-dashoffset: 0;
  animation: neonTravel 3.5s linear infinite;
  opacity: 0.55;
  filter: blur(3px);
}

@keyframes neonTravel {
  0%   { stroke-dashoffset: 2120; }
  100% { stroke-dashoffset: 0; }
}

.amount-frame .reel-row {
  position: relative;
  z-index: 1;
}

  font-weight: bold;
  font-family: 'Orbitron', 'Courier New', monospace;
  letter-spacing: 1px;
  text-shadow: 
    0 0 10px #00ff66,
    0 0 20px rgba(0,255,102,0.5);
  font-variant-numeric: tabular-nums;
  width: 220px;                         /* ancho fijo MAYOR */
  text-align: center;
  white-space: nowrap;
  font-feature-settings: "tnum";
  overflow: hidden;
}
.promo-mini-odo.minor .promo-mini-reels {
  text-shadow: 
    0 0 10px #ff0033,
    0 0 20px rgba(255,0,51,0.5);
}

/* Linea de glow inferior */
.promo-mini-glow-line {
  width: 80%;
  height: 1px;
  margin-top: 4px;
  background: linear-gradient(90deg, transparent, currentColor, transparent);
  color: #00ff66;
  opacity: 0.7;
  animation: glowLineSweep 2s ease-in-out infinite;
}
.promo-mini-odo.minor .promo-mini-glow-line { color: #ff0033; }
@keyframes glowLineSweep {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* Decoracion inferior */
.promo-bottom-deco {
  position: fixed;
  bottom: 70px;
  left: 0;
  right: 0;
  height: 50px;
  display: none;
  z-index: 9989;
  pointer-events: none;
}
.promo-bottom-deco.showing {
  display: block;
  animation: hudFadeIn 0.6s ease-out;
}
@keyframes hudFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.promo-bottom-deco svg {
  width: 100%;
  height: 100%;
}

/* ============================================================
   MODAL GANADOR estilo F1/Racing
   ============================================================ */
.winner-speed-lines {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
  opacity: 0.7;
}

.winner-flag {
  position: absolute;
  top: 5%;
  width: 12%;
  height: 90%;
  pointer-events: none;
  z-index: 1;
}
.winner-flag.left { left: 1%; }
.winner-flag.right { right: 1%; transform: scaleX(-1); }

.winner-sparks {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 2;
  filter: drop-shadow(0 0 6px #ffaa00);
}

/* Ocultar las estrellas viejas si quedaron */
.winner-stars { display: none !important; }

/* ============================================================
   Decoraciones SVG en esquinas inferiores - CON CUERPO
   ============================================================ */
.promo-corner-left,
.promo-corner-right {
  position: fixed;
  bottom: 30px;              /* mas pegado al bottom */
  width: 280px;
  height: 200px;
  z-index: 9988;
  pointer-events: none;
  display: none;
  filter: drop-shadow(0 0 15px currentColor) drop-shadow(0 0 30px currentColor);
}
.promo-corner-left { 
  left: 0;                   /* pegado a la esquina izquierda */
  color: #00ff66; 
}
.promo-corner-right { 
  right: 0;                  /* pegado a la esquina derecha */
  color: #ff0033; 
}

/* Corners SUPERIORES */
.promo-corner-top-left,
.promo-corner-top-right {
  position: fixed;
  top: 30px;
  width: 280px;
  height: 200px;
  z-index: 9988;
  pointer-events: none;
  display: none;
  filter: drop-shadow(0 0 15px currentColor) drop-shadow(0 0 30px currentColor);
}
.promo-corner-top-left {
  left: 0;
  color: #ffd700;
}
.promo-corner-top-right {
  right: 0;
  color: #ff8800;
}
.promo-corner-top-left.showing,
.promo-corner-top-right.showing {
  display: block;
  animation: cornerTopFadeIn 0.8s ease-out;
}
@keyframes cornerTopFadeIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

.promo-corner-left.showing,
.promo-corner-right.showing {
  display: block;
  animation: cornerFadeIn 0.8s ease-out;
}
@keyframes cornerFadeIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}


/* =================================================================
   ============= ESTILOS PARA LA VISTA HOME =====================
   ================================================================= */





.home-scene {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* ============================================================
   ESCUDO (igual al de los sheets, idéntico al dashboard)
   ============================================================ */
#homeShieldSvg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 8;
  pointer-events: none;
}

@keyframes blinkA { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes blinkB { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes blinkC { 0%,100% { opacity: 0.5; } 30% { opacity: 1; } 70% { opacity: 0.5; } }

/* ============================================================
   PISTA DE CARRERAS estilo videojuego
   ============================================================ */
#homeTrackSvg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 5;
  pointer-events: none;
}

/* Capa 1: SOMBRA de la pista (subtle) */
.track-shadow {
  fill: none;
  stroke: rgba(0,0,0,0.6);
  stroke-width: 72;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Capa 2: BORDES ROJO-BLANCO a cuadros (estilo F1) */
.track-curb-red {
  fill: none;
  stroke: #d01030;
  stroke-width: 64;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.track-curb-white {
  fill: none;
  stroke: #ffffff;
  stroke-width: 64;
  stroke-linecap: butt;
  stroke-linejoin: miter;
  /* Dasharray crea el efecto de cuadros alternando con el rojo de fondo */
  stroke-dasharray: 26 26;
}

/* Capa 3: ASFALTO negro (más delgado que los bordes) */
.track-asphalt {
  fill: none;
  stroke: #2a2620;
  stroke-width: 52;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Capa 4: LÍNEA AMARILLA central (separación de carriles) */
.track-centerline {
  fill: none;
  stroke: #ffe066;
  stroke-width: 2.5;
  stroke-dasharray: 18 14;
  stroke-linecap: round;
}

/* ============================================================
   POZOS (estilo home-prototipo)
   ============================================================ */
.home-pot {
  position: absolute;
  display: grid;
  align-items: center;
  padding: 14px 20px;
  border: 2px solid;
  border-radius: 14px;
  overflow: hidden;
  background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(0,0,0,0.97));
  box-shadow: inset 0 0 24px rgba(0,0,0,0.7), 0 0 14px var(--pot-glow);
  z-index: 6;
}
.home-pot.home-mini   { border-color: var(--c-mini);  --pot-glow: rgba(0,255,102,0.35); --pot-c: var(--c-mini);  padding: 22px 28px; }
.home-pot.home-minor  { border-color: var(--c-minor); --pot-glow: rgba(255,0,51,0.35); --pot-c: var(--c-minor); padding: 22px 28px; }
.home-pot.home-major  { border-color: var(--c-major); --pot-glow: rgba(255,204,0,0.4); --pot-c: var(--c-major); }
.home-pot.home-grand  { border-color: var(--c-grand); --pot-glow: rgba(0,229,212,0.4); --pot-c: var(--c-grand); }

/* Pozos del home: rectangulos simples SIN borde (RESPONSIVOS) */
.home-pot.home-grand,
.home-pot.home-major,
.home-pot.home-minor,
.home-pot.home-mini {
  border: none;
  border-radius: 0.6cqw;
  background: rgba(10, 0, 4, 0.92);
  overflow: hidden;
  container-type: inline-size;
}
.home-pot.home-grand { padding: 1cqw 2.5cqw 2cqw 0.5cqw; filter: none; }
.home-pot.home-major { padding: 1cqw 2.5cqw 2cqw 0.5cqw; filter: none; }
.home-pot.home-minor { padding: 1cqw 2.5cqw 3cqw 1.5cqw; filter: none; }
.home-pot.home-mini  { padding: 1cqw 2.5cqw 3cqw 1.5cqw; filter: none; }

/* MINI / MINOR: layout nuevo - header arriba (status+subtitle izq | titulo der), odometro abajo grande */
.home-pot.home-mini, .home-pot.home-minor {
  grid-template-columns: 1fr;
  grid-template-rows: auto 1fr;
  gap: 0.8cqw;
}
.home-pot-mini-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  width: 100%;
  gap: 1.5cqw;
}
.home-pot-mini-left {
  display: flex;
  flex-direction: column;
  gap: 0.3cqw;
  align-items: flex-start;
}
.home-pot-mini-right {
  display: flex;
  align-items: flex-start;
}
.home-pot.home-mini .home-odometer,
.home-pot.home-minor .home-odometer {
  width: 100%;
  justify-content: center;
  flex: 1;
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 0;
  box-shadow: none;
}
/* MAJOR / GRAND: 2 columnas (titulo izq / sprite+status der) */
.home-pot.home-major, .home-pot.home-grand {
  grid-template-columns: minmax(0, 48%) 1fr;
  gap: 1cqw;
}

.home-pot-label { display: flex; flex-direction: column; padding-left: 10px; min-width: 0; }

/* GRAND/MAJOR: label arriba-izquierda */
.home-pot.home-major .home-pot-label,
.home-pot.home-grand .home-pot-label {
  align-self: start;
  justify-self: start;
}

/* Contenedor derecho: odometro/sprite arriba, status debajo */
.home-pot-right-stack {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  gap: 6px;
  min-width: 0;
}
/* En GRAND/MAJOR el lado derecho: solo el sprite (status sale del stack y se posiciona aparte) */
.home-pot.home-major .home-pot-right-stack,
.home-pot.home-grand .home-pot-right-stack {
  align-items: stretch;
  justify-content: center;
  padding-left: 20px;
  height: 100%;
}
/* Fila con paneles de stats a los lados del vehiculo */
.home-pot-vehicle-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1.5cqw;
  width: 100%;
  height: 100%;
}
.home-pot-stat-panel {
  width: 13cqw;
  height: 22cqw;
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px rgba(255,200,0,0.3));
}
.home-pot.home-grand .home-pot-stat-panel {
  filter: drop-shadow(0 0 6px rgba(0,229,212,0.4));
}
.home-pot.home-grand .home-pot-stat-left {
  transform: translate(36%, -38%);
}
.home-pot.home-grand .home-pot-stat-right {
  transform: translate(-126%, -38%);
}
/* KPIs en MAJOR: ambos a la misma altura, subidos */
.home-pot.home-major .home-pot-stat-left {
  transform: translate(33%, -20%);
}
.home-pot.home-major .home-pot-stat-right {
  transform: translate(-40%, -18%);
}
.home-pot.home-major .home-pot-vehicle-box,
.home-pot.home-grand .home-pot-vehicle-box {
  align-self: center;
  flex: 0 0 auto;
}
/* Status en GRAND/MAJOR: posicion absoluta en la esquina inferior izquierda */
.home-pot.home-major,
.home-pot.home-grand {
  position: absolute;
}
.home-pot.home-major .home-pot-status-row,
.home-pot.home-grand .home-pot-status-row {
  position: absolute;
  left: 1.5cqw;
  bottom: 1cqw;
  z-index: 5;
}
.home-pot-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(18px, 2.6vw, 48px);
  letter-spacing: 2px;
  line-height: 1;
  white-space: nowrap;
  /* Gradiente metálico vertical más sutil (legible) */
  background: linear-gradient(180deg,
    color-mix(in srgb, var(--pot-c) 70%, #fff) 0%,
    var(--pot-c) 45%,
    color-mix(in srgb, var(--pot-c) 70%, #000) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  /* Borde dorado más delgado */
  -webkit-text-stroke: 1px var(--gold);
  /* Glow sutil solo del color del pozo */
  filter: drop-shadow(0 0 4px var(--pot-c));
}
.home-pot.home-major .home-pot-title, .home-pot.home-grand .home-pot-title { 
  font-size: clamp(22px, 3.4vw, 60px);
  -webkit-text-stroke: 1.2px var(--gold);
}
.home-pot-subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(9px, 1vw, 18px);
  letter-spacing: 2px;
  color: rgba(255, 215, 0, 0.7);
  margin-top: 6px;
  white-space: nowrap;
}

.home-pot-center { display: flex; align-items: center; justify-content: center; min-width: 0; overflow: hidden; }

.home-odometer { display: flex; gap: 0.4cqw; flex-shrink: 1; min-width: 0; align-items: center; }
.home-odometer-prefix {
  font-size: 6cqw;
  color: var(--gold);
  margin-right: 1.5cqw;
  display: flex; align-items: center;
  font-weight: 900;
  text-shadow: 0 0 6px var(--gold-deep);
}
.home-digit {
  width: 11.6cqw;
  height: 14.9cqw;
  background: linear-gradient(180deg, #1a0a00, #2a1500, #1a0a00);
  border: 1px solid var(--gold-dark);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9.9cqw;
  color: var(--gold);
  font-weight: 900;
  text-shadow: 0 0 6px var(--gold-deep);
  box-shadow: inset 0 0 6px rgba(0,0,0,0.8), inset 0 2px 0 rgba(255,215,0,0.15);
  flex-shrink: 0;
}
.home-digit.comma { width: 3.3cqw; background: transparent; border: none; box-shadow: none; color: var(--gold); font-size: 9.9cqw; }

/* SPRITE giratorio en MAJOR/GRAND */
.home-pot-vehicle-box {
  --sprite-size: clamp(180px, 18vw, 260px);
  width: var(--sprite-size);
  height: var(--sprite-size);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: auto;
  flex-shrink: 0;
}
/* PEDESTAL: elipse dorada en la base del vehiculo (ruedas) */
.home-pot-vehicle-box::after {
  content: '';
  position: absolute;
  left: 50%;
  bottom: 26%;
  transform: translateX(-50%);
  width: 95%;
  height: 22%;
  background: radial-gradient(ellipse at center,
    rgba(255, 215, 0, 1) 0%,
    rgba(255, 170, 0, 0.8) 30%,
    rgba(255, 136, 0, 0.5) 55%,
    rgba(255, 100, 0, 0.2) 75%,
    transparent 100%);
  border-radius: 50%;
  filter: blur(4px);
  z-index: 0;
  pointer-events: none;
}
/* Pedestal del auto un poco mas arriba y mas chico */
.home-pot.home-grand .home-pot-vehicle-box::after {
  bottom: 47%;
  left: 40%;
  width: 75%;
  height: 17%;
}
/* AUTO un poco mas grande que la moto */
.home-pot.home-grand .home-pot-vehicle-box {
  --sprite-size: clamp(260px, 24vw, 360px);
}
.home-pot.home-grand .home-pot-sprite {
  filter: none;
  transform: translate(-10%, -15%);
}
.home-pot.home-major .home-pot-sprite {
  transform: translateY(-8%);
}
.home-pot-vehicle-box::before {
  content: '';
  position: absolute;
  width: 85%; height: 85%;
  border-radius: 50%;
  background: radial-gradient(circle, var(--pot-glow) 0%, transparent 70%);
}
/* Brillo del auto en GRAND: a la derecha y menos denso */
.home-pot.home-grand .home-pot-vehicle-box::before {
  transform: translate(-10%, -15%);
  opacity: 0.55;
}
.home-pot-sprite {
  width: var(--sprite-size);
  height: var(--sprite-size);
  position: relative; z-index: 1;
  background-repeat: no-repeat;
  background-size: calc(var(--sprite-size) * 6) calc(var(--sprite-size) * 6);
  background-position: 0 0;
  filter: drop-shadow(0 0 12px var(--pot-c));
}
.home-pot-sprite.home-moto {
  background-image: url('moto_sprite.png');
  animation: spX 0.3s steps(6) infinite, spY 1.8s steps(6) infinite;
}
.home-pot-sprite.home-car {
  background-image: url('auto_sprite.png');
  animation: spX2 0.36s steps(6) infinite, spY2 2.16s steps(6) infinite;
}
@keyframes spX  { to { background-position-x: calc(var(--sprite-size) * -6); } }
@keyframes spY  { to { background-position-y: calc(var(--sprite-size) * -6); } }
@keyframes spX2 { to { background-position-x: calc(var(--sprite-size) * -6); } }
@keyframes spY2 { to { background-position-y: calc(var(--sprite-size) * -6); } }

.home-pot-right { display: flex; flex-direction: column; align-items: flex-end; text-align: right; padding-right: 2px; min-width: 0; }

/* Status debajo del odometro/sprite */
.home-pot-status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.home-pot-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(7px, 0.65vw, 10px);
  color: rgba(255,255,255,0.5);
  letter-spacing: 1px;
  white-space: nowrap;
}
.home-pot-status {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: clamp(8px, 0.75vw, 11px);
  color: var(--pot-c);
  letter-spacing: 1px;
  display: inline-flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.home-pot-status::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--pot-c);
  box-shadow: 0 0 5px var(--pot-c);
  animation: statusPulse 1.5s ease-in-out infinite;
}
@keyframes statusPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ============================================================
   BANNER PROMOCIONAL (espacio vacio bajo MINI/MINOR)
   ============================================================ */
.home-promo-banner {
  position: absolute;
  z-index: 6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 8px 20px;
  background: transparent;
  background-image: none;
  border: none;
  box-shadow: none;
  filter: drop-shadow(0 0 12px rgba(255,170,0,0.55));
}

/* Fila del titulo: estrellas a los lados del texto */
.home-promo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(12px, 1.6vw, 28px);
}

.home-promo-star {
  width: clamp(22px, 2.2vw, 38px);
  height: clamp(22px, 2.2vw, 38px);
  flex-shrink: 0;
  filter: drop-shadow(0 0 6px var(--gold-deep)) drop-shadow(0 0 12px var(--gold));
  animation: homeStarPulse 1.6s ease-in-out infinite;
}
.home-promo-star.home-right { animation-delay: 0.8s; }

@keyframes homeStarPulse {
  0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.85; }
  50%      { transform: scale(1.15) rotate(15deg); opacity: 1; }
}

.home-promo-main {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(28px, 3.4vw, 58px);
  letter-spacing: 4px;
  line-height: 1;
  white-space: nowrap;
  background: linear-gradient(180deg,
    #fff8c0 0%,
    var(--gold) 30%,
    var(--gold-deep) 60%,
    var(--gold) 80%,
    #fff8c0 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  -webkit-text-stroke: 1px rgba(106, 61, 0, 0.7);
  filter: drop-shadow(0 0 8px var(--gold-deep));
  animation: homePromoPulse 1.6s ease-in-out infinite;
}
.home-promo-sub {
  font-family: 'Share Tech Mono', monospace;
  font-weight: 700;
  font-size: clamp(11px, 1.1vw, 18px);
  letter-spacing: 3px;
  color: rgba(255, 215, 0, 0.85);
  margin-top: 12px;
  text-shadow: 0 0 6px rgba(255, 136, 0, 0.6);
  white-space: nowrap;
}
@keyframes homePromoPulse {
  0%, 100% { filter: drop-shadow(0 0 8px var(--gold-deep)); transform: scale(1); }
  50%      { filter: drop-shadow(0 0 16px var(--gold)) drop-shadow(0 0 4px #fff); transform: scale(1.03); }
}

/* ============================================================
   VIDEO DE FONDO REAL (igual a los sheets)
   ============================================================ */
.home-bg-video {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
  opacity: 0.4;
  pointer-events: none;
}

/* TITULO superior - letrero estilo marquee de casino, con saliente abajo */
.home-marquee-title {
  position: absolute;
  top: 12.5vh;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  text-align: center;
  padding: 14px 70px;
  background: linear-gradient(180deg, #3a0010 0%, #1a0006 50%, #3a0010 100%);
  border: 3px solid #ffd700;
  border-radius: 12px;
  box-shadow:
    0 0 0 1px #ff8800 inset,
    0 0 14px #ffd700 inset,
    0 0 24px rgba(255, 170, 0, 0.85),
    0 0 48px rgba(255, 100, 0, 0.55),
    0 4px 12px rgba(0, 0, 0, 0.8);
  white-space: nowrap;
}
/* LEDs alrededor del letrero */
.home-marquee-title::before,
.home-marquee-title::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #ffd700 30%, #ff8800 70%, #cc4400 100%);
  box-shadow: 0 0 12px #ffd700, 0 0 6px #fff, 0 0 20px #ff8800;
  transform: translateY(-50%);
  animation: blinkA 1.2s infinite;
}
.home-marquee-title::before { left: 14px; animation-delay: 0s; }
.home-marquee-title::after  { right: 14px; animation-delay: 0.6s; }

.home-marquee-title h1 {

<script>
// Contador global de carga
(function() {
  let loadedItems = 0;
  let totalItems = 4; // moto + auto F1 + 2 videos
  
  window.__updatePreloader = function() {
    const items = (window.__loadedMoto ? 1 : 0) +
                  (window.__loadedAuto ? 1 : 0) +
                  (window.__loadedVideo1 ? 1 : 0) +
                  (window.__loadedVideo2 ? 1 : 0);
    const pct = Math.min(100, Math.round((items / totalItems) * 100));
    
    const txt = document.getElementById('preloaderText');
    const fill = document.getElementById('preloaderProgressFill');
    if (txt) txt.textContent = 'CARGANDO... ' + pct + '%';
    if (fill) fill.style.width = pct + '%';
    
    if (pct >= 100) {
      setTimeout(function() {
        const pre = document.getElementById('preloader');
        if (pre) {
          pre.style.opacity = '0';
          setTimeout(function() { pre.style.display = 'none'; }, 500);
        }
      }, 300);
    }
  };
  
  // Listener para los videos
  document.addEventListener('DOMContentLoaded', function() {
    const videos = document.querySelectorAll('.bg-video');
    videos.forEach(function(v, i) {
      v.addEventListener('canplaythrough', function() {
        window['__loadedVideo' + (i+1)] = true;
        window.__updatePreloader();
      }, { once: true });
      // Fallback: si tarda mas de 5s, marcarlo como cargado
      setTimeout(function() {
        if (!window['__loadedVideo' + (i+1)]) {
          window['__loadedVideo' + (i+1)] = true;
          window.__updatePreloader();
        }
      }, 5000);
    });
  });
  
  // Fallback: si el modelo tarda mas de 15s
  setTimeout(function() {
    if (!window.__loadedMoto) {
      window.__loadedMoto = true;
      window.__updatePreloader();
    }
    if (!window.__loadedAuto) {
      window.__loadedAuto = true;
      window.__updatePreloader();
    }
  }, 30000);
})();
</script>

<script>
// HACK: simular click humano para desbloquear autoplay de videos
// Se ejecuta apenas el body existe (antes de cualquier otra cosa)
(function() {
  function unlockAutoplay() {
    // Crear evento sintetico de pointer/click en el documento
    try {
      const event = new MouseEvent('click', {
        bubbles: true,
        cancelable: true,
        view: window
      });
      document.body.dispatchEvent(event);
      
      // Tambien tocar todos los videos para "marcarlos" como interactuados
      document.querySelectorAll('video').forEach(v => {
        v.muted = true;
        const p = v.play();
        if (p) p.catch(() => {});
      });
      console.log('[AUTOPLAY HACK] click sintetico disparado');
    } catch(e) {
      console.warn('[AUTOPLAY HACK] error:', e.message);
    }
  }
  
  // Disparar varias veces en distintos momentos
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', unlockAutoplay);
  } else {
    unlockAutoplay();
  }
  window.addEventListener('load', unlockAutoplay);
  setTimeout(unlockAutoplay, 100);
  setTimeout(unlockAutoplay, 500);
  setTimeout(unlockAutoplay, 1500);
})();
</script>

// Helper: devuelve la duracion correcta segun la hoja (HOME usa HOME_DURATION)

let currentSheetIdx = 0;
let nextChangeTime = 0;

let progressBarLength = 0;

// =================================================================
// CONSTRUIR EL ESCUDO SVG SEGUN LA HOJA ACTIVA
// =================================================================
function buildShield(sheetData) {
  // Si la hoja es HOME, usar un theme "dorado/neutral" - el dashboard construye su escudo normal
  // (el HOME ya no tiene escudo propio - usa el del dashboard)
  
  const svg = document.getElementById('shieldSvg');
  const w = window.innerWidth;
  const h = window.innerHeight;
  const screenRatio = w / h;

  const VBH = 620;
  let VBW;
  if (screenRatio > 1.13) {
    VBW = Math.round(VBH * screenRatio);
  } else {
    VBW = 700;
  }

  svg.setAttribute('viewBox', `0 0 ${VBW} ${VBH}`);

  const CX = VBW / 2;
  const SH_HALF = 80;
  const SH_OUTER = 110;
  const SH_TOP = 18;
  const FLAT_TOP = 40;
  const SX0 = 60;
  const SX1 = VBW - 60;
  const ST = FLAT_TOP;
  const SY_TOP = SH_TOP;
  const TL_SH_END = CX - SH_HALF - SH_OUTER;
  const TL_SH_TOP_LEFT = CX - SH_HALF;
  const TL_SH_TOP_RIGHT = CX + SH_HALF;
  const TL_SH_END_RIGHT = CX + SH_HALF + SH_OUTER;
  const BB_OUT_L = CX - 130;
  const BB_IN_L = CX - 110;
  const BB_IN_R = CX + 110;
  const BB_OUT_R = CX + 130;

  // PATHS
  const mainPath = `M ${SX0},${ST} L ${TL_SH_END},${ST} L ${TL_SH_TOP_LEFT},${SY_TOP} L ${TL_SH_TOP_RIGHT},${SY_TOP} L ${TL_SH_END_RIGHT},${ST} L ${SX1},${ST} Q ${SX1+20},${ST} ${SX1+20},${ST+20} L ${SX1+20},${VBH-ST-20} Q ${SX1+20},${VBH-ST} ${SX1},${VBH-ST} L ${BB_OUT_R},${VBH-ST} L ${BB_IN_R},${VBH-20} L ${BB_IN_L},${VBH-20} L ${BB_OUT_L},${VBH-ST} L ${SX0},${VBH-ST} Q ${SX0-20},${VBH-ST} ${SX0-20},${VBH-ST-20} L ${SX0-20},${ST+20} Q ${SX0-20},${ST} ${SX0},${ST} Z`;
  const goldPath = `M ${SX0+18},${ST+18} L ${TL_SH_END+10},${ST+18} L ${TL_SH_TOP_LEFT+10},${SY_TOP+18} L ${TL_SH_TOP_RIGHT-10},${SY_TOP+18} L ${TL_SH_END_RIGHT-10},${ST+18} L ${SX1-18},${ST+18} Q ${SX1+2},${ST+18} ${SX1+2},${ST+38} L ${SX1+2},${VBH-ST-38} Q ${SX1+2},${VBH-ST-18} ${SX1-18},${VBH-ST-18} L ${BB_OUT_R-12},${VBH-ST-18} L ${BB_IN_R-12},${VBH-38} L ${BB_IN_L+12},${VBH-38} L ${BB_OUT_L+12},${VBH-ST-18} L ${SX0+18},${VBH-ST-18} Q ${SX0-2},${VBH-ST-18} ${SX0-2},${VBH-ST-38} L ${SX0-2},${ST+38} Q ${SX0-2},${ST+18} ${SX0+18},${ST+18} Z`;
  const innerPath = `M ${SX0+31},${ST+31} L ${TL_SH_END+14},${ST+31} L ${TL_SH_TOP_LEFT+14},${SY_TOP+31} L ${TL_SH_TOP_RIGHT-14},${SY_TOP+31} L ${TL_SH_END_RIGHT-14},${ST+31} L ${SX1-31},${ST+31} Q ${SX1-11},${ST+31} ${SX1-11},${ST+51} L ${SX1-11},${VBH-ST-51} Q ${SX1-11},${VBH-ST-31} ${SX1-31},${VBH-ST-31} L ${BB_OUT_R-26},${VBH-ST-31} L ${BB_IN_R-26},${VBH-51} L ${BB_IN_L+26},${VBH-51} L ${BB_OUT_L+26},${VBH-ST-31} L ${SX0+31},${VBH-ST-31} Q ${SX0+11},${VBH-ST-31} ${SX0+11},${VBH-ST-51} L ${SX0+11},${ST+51} Q ${SX0+11},${ST+31} ${SX0+31},${ST+31} Z`;

  // BARRA DE PROGRESO: sigue exactamente el promedio entre goldPath e innerPath
  // Empieza en el centro superior y recorre todo el perimetro (sentido horario)
  //
  // PROMEDIO entre dorada (offset 18) y roja delgada (offset 31):
  // - Y top plana: ST + 24.5    (entre ST+18 y ST+31)
  // - Y top central: SY_TOP + 24.5   (entre SY_TOP+18 y SY_TOP+31)
  // - Y bottom plana: VBH - ST - 24.5
  // - Y bottom central: VBH - 44.5
  // - X lateral derecho vertical: SX1 - 4.5  (entre SX1+2 y SX1-11)
  // - X lateral izquierdo vertical: SX0 + 4.5  (entre SX0-2 y SX0+11)
  // - Esquinas (curvas Q): se promedian tambien

  const pT = ST + 24.5;            // y top parte plana
  const pTc = SY_TOP + 24.5;       // y top parte central elevada
  const pB = VBH - ST - 24.5;      // y bottom parte plana
  const pBc = VBH - 44.5;          // y bottom parte central baja
  const pR = SX1 - 4.5;            // x lateral derecho vertical
  const pL = SX0 + 4.5;            // x lateral izquierdo vertical
  const pXR = SX1 - 24.5;          // x donde el top/bottom plano termina y empieza la curva derecha
  const pXL = SX0 + 24.5;          // x donde el top/bottom plano empieza desde la curva izquierda

  // Path: empieza en centro superior, va horario completo, vuelve al inicio
  const progressPath = [
    `M ${CX} ${pTc}`,
    // Top derecha: del centro hacia la diagonal del shoulder
    `L ${TL_SH_TOP_RIGHT-12} ${pTc}`,
    // Diagonal del shoulder (sube hacia el tramo plano)
    `L ${TL_SH_END_RIGHT-12} ${pT}`,
    // Tramo plano superior derecho hasta antes de la curva
    `L ${pXR} ${pT}`,
    // Curva esquina superior derecha
    `Q ${pR} ${pT} ${pR} ${ST+44.5}`,
    // Lateral derecho vertical
    `L ${pR} ${VBH-ST-44.5}`,
    // Curva esquina inferior derecha
    `Q ${pR} ${pB} ${pXR} ${pB}`,
    // Tramo plano inferior derecho hasta el shoulder bottom
    `L ${BB_OUT_R-19} ${pB}`,
    // Diagonal shoulder bottom derecho (baja al centro)
    `L ${BB_IN_R-19} ${pBc}`,
    // Centro inferior plano (entre los dos shoulders bottom)
    `L ${BB_IN_L+19} ${pBc}`,
    // Diagonal shoulder bottom izquierdo (sube)
    `L ${BB_OUT_L+19} ${pB}`,
    // Tramo plano inferior izquierdo
    `L ${pXL} ${pB}`,
    // Curva esquina inferior izquierda
    `Q ${pL} ${pB} ${pL} ${VBH-ST-44.5}`,
    // Lateral izquierdo vertical (sube)
    `L ${pL} ${ST+44.5}`,
    // Curva esquina superior izquierda
    `Q ${pL} ${pT} ${pXL} ${pT}`,
    // Tramo plano superior izquierdo hasta antes del shoulder
    `L ${TL_SH_END+12} ${pT}`,
    // Diagonal del shoulder izquierdo (sube al centro elevado)
    `L ${TL_SH_TOP_LEFT+12} ${pTc}`,
    // Cierra al centro superior
    `L ${CX} ${pTc}`
  ].join(' ');

  // PATH INTERIOR para el auto (solo HOME): misma forma del escudo pero
  // todas las coordenadas desplazadas OFFSET pixeles hacia adentro.
  const OFFSET_INNER = 14;
  const i_pT = pT + OFFSET_INNER;
  const i_pTc = pTc + OFFSET_INNER;
  const i_pB = pB - OFFSET_INNER;
  const i_pBc = pBc - OFFSET_INNER;
  const i_pR = pR - OFFSET_INNER;
  const i_pL = pL + OFFSET_INNER;
  const i_pXR = pXR - OFFSET_INNER;
  const i_pXL = pXL + OFFSET_INNER;
  const innerProgressPath = [
    `M ${CX} ${i_pTc}`,
    `L ${TL_SH_TOP_RIGHT-12-OFFSET_INNER} ${i_pTc}`,
    `L ${TL_SH_END_RIGHT-12-OFFSET_INNER} ${i_pT}`,
    `L ${i_pXR} ${i_pT}`,
    `Q ${i_pR} ${i_pT} ${i_pR} ${ST+44.5+OFFSET_INNER}`,
    `L ${i_pR} ${VBH-ST-44.5-OFFSET_INNER}`,
    `Q ${i_pR} ${i_pB} ${i_pXR} ${i_pB}`,
    `L ${BB_OUT_R-19-OFFSET_INNER} ${i_pB}`,
    `L ${BB_IN_R-19-OFFSET_INNER} ${i_pBc}`,
    `L ${BB_IN_L+19+OFFSET_INNER} ${i_pBc}`,
    `L ${BB_OUT_L+19+OFFSET_INNER} ${i_pB}`,
    `L ${i_pXL} ${i_pB}`,
    `Q ${i_pL} ${i_pB} ${i_pL} ${VBH-ST-44.5-OFFSET_INNER}`,
    `L ${i_pL} ${ST+44.5+OFFSET_INNER}`,
    `Q ${i_pL} ${i_pT} ${i_pXL} ${i_pT}`,
    `L ${TL_SH_END+12+OFFSET_INNER} ${i_pT}`,
    `L ${TL_SH_TOP_LEFT+12+OFFSET_INNER} ${i_pTc}`,
    `L ${CX} ${i_pTc}`
  ].join(' ');

  // BOMBILLOS
  const bulbSpacing = 40;
  const bulbs = [];

  for (let x = SX0 + 40; x < TL_SH_END - 10; x += bulbSpacing) {
    bulbs.push({cx: x, cy: ST, delay: ((x % 100) * 0.01).toFixed(2)});
  }
  for (let x = TL_SH_TOP_LEFT + 15; x < TL_SH_TOP_RIGHT - 10; x += bulbSpacing) {
    bulbs.push({cx: x, cy: SY_TOP, delay: ((x % 100) * 0.012).toFixed(2)});
  }
  bulbs.push({cx: (TL_SH_END + TL_SH_TOP_LEFT) / 2, cy: (ST + SY_TOP) / 2, delay: '0.15'});
  bulbs.push({cx: (TL_SH_TOP_RIGHT + TL_SH_END_RIGHT) / 2, cy: (SY_TOP + ST) / 2, delay: '0.25'});
  for (let x = TL_SH_END_RIGHT + 30; x < SX1 - 10; x += bulbSpacing) {
    bulbs.push({cx: x, cy: ST, delay: ((x % 100) * 0.011).toFixed(2)});
  }
  for (let y = ST + 50; y < VBH - ST - 30; y += 50) {
    bulbs.push({cx: SX0 - 20, cy: y, delay: ((y % 100) * 0.008).toFixed(2)});
  }
  for (let y = ST + 50; y < VBH - ST - 30; y += 50) {
    bulbs.push({cx: SX1 + 20, cy: y, delay: ((y % 100) * 0.009).toFixed(2)});
  }
  for (let x = SX0 + 40; x < BB_OUT_L - 5; x += bulbSpacing) {
    bulbs.push({cx: x, cy: VBH - ST, delay: ((x % 100) * 0.013).toFixed(2)});
  }
  bulbs.push({cx: (BB_OUT_L + BB_IN_L) / 2, cy: (VBH - ST + VBH - 20) / 2, delay: '0.4'});
  bulbs.push({cx: (BB_IN_R + BB_OUT_R) / 2, cy: (VBH - ST + VBH - 20) / 2, delay: '0.5'});
  for (let x = BB_IN_L + 15; x < BB_IN_R - 10; x += bulbSpacing) {
    bulbs.push({cx: x, cy: VBH - 20, delay: ((x % 100) * 0.014).toFixed(2)});
  }
  for (let x = BB_OUT_R + 20; x < SX1 - 10; x += bulbSpacing) {
    bulbs.push({cx: x, cy: VBH - ST, delay: ((x % 100) * 0.015).toFixed(2)});
  }

  const screwOff = 20;
  const screws = [
    {cx: SX0 + screwOff, cy: ST + screwOff + 18},
    {cx: SX1 - screwOff, cy: ST + screwOff + 18},
    {cx: SX0 + screwOff, cy: VBH - ST - screwOff - 18},
    {cx: SX1 - screwOff, cy: VBH - ST - screwOff - 18},
  ];

  const flagW = 64;
  const flagH = 14;
  const flagL_x = TL_SH_END + 10;
  const flagR_x = TL_SH_END_RIGHT - flagW - 10;
  const flag_y = ST + 18;

  // Color de la malla y la linea delgada interna segun el theme
  let gridStrokeColor, innerLineColor;
  if (sheetData.theme === 'green') {
    gridStrokeColor = '#00cc44';
    innerLineColor = 'rgba(0,255,102,0.7)';
  } else if (sheetData.theme === 'yellow') {
    gridStrokeColor = '#ffaa00';
    innerLineColor = 'rgba(255,204,0,0.7)';
  } else if (sheetData.theme === 'turquoise') {
    gridStrokeColor = '#00aa99';
    innerLineColor = 'rgba(0,229,212,0.75)';
  } else if (sheetData.theme === 'home') {
    gridStrokeColor = '#ffaa00';
    innerLineColor = 'rgba(255,215,0,0.6)';
  } else {
    gridStrokeColor = '#ff0033';
    innerLineColor = 'rgba(255,0,51,0.7)';
  }

  let svgContent = `
    <defs>
      <linearGradient id="redLine" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ff5577"/>
        <stop offset="50%" stop-color="#cc0022"/>
        <stop offset="100%" stop-color="#7a0014"/>
      </linearGradient>
      <linearGradient id="goldStroke" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffd600"/>
        <stop offset="40%" stop-color="#ff8800"/>
        <stop offset="60%" stop-color="#b8860b"/>
        <stop offset="100%" stop-color="#ffd600"/>
      </linearGradient>
      <radialGradient id="bigBulb" cx="40%" cy="35%" r="50%">
        <stop offset="0%" stop-color="#ffffff"/>
        <stop offset="20%" stop-color="#fff8c0"/>
        <stop offset="45%" stop-color="#ffd700"/>
        <stop offset="75%" stop-color="#ff8800"/>
        <stop offset="100%" stop-color="#cc4400"/>
      </radialGradient>
      <radialGradient id="bulbHalo" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
        <stop offset="40%" stop-color="#ff8800" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
      </radialGradient>
      <pattern id="gridInner" width="22" height="22" patternUnits="userSpaceOnUse">
        <path d="M 22 0 L 0 0 0 22" fill="none" stroke="${gridStrokeColor}" stroke-width="0.6" opacity="0.55"/>
      </pattern>
      <filter id="bigGlow"><feGaussianBlur stdDeviation="6"/></filter>
    </defs>

    <path d="${mainPath}" fill="rgba(0,0,0,0.55)"/>
    <path d="${mainPath}" fill="url(#gridInner)" opacity="0.7"/>
    <path d="${mainPath}" fill="none" stroke="url(#redLine)" stroke-width="13" stroke-linejoin="round" filter="drop-shadow(0 0 12px rgba(255,0,51,0.7))"/>
    <path d="${goldPath}" fill="none" stroke="url(#goldStroke)" stroke-width="2"/>
    <path d="${innerPath}" fill="none" stroke="${innerLineColor}" stroke-width="1"/>

    <!-- BARRA DE PROGRESO: track (fondo tenue) -->
    <path d="${progressPath}" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Path reutilizable para la moto (animateMotion lo usa por id) -->
    <path id="progressPathDef" d="${progressPath}" fill="none" stroke="none" pathLength="1"/>

    <!-- BARRA DE PROGRESO: glow exterior amplio -->
    <path id="progressBarGlow" d="${progressPath}" fill="none" stroke="${sheetData.accent}" stroke-width="6" stroke-linecap="round"
      style="filter: blur(4px) drop-shadow(0 0 8px ${sheetData.accent}); opacity: 0.6; stroke-dasharray: 1; stroke-dashoffset: 1;"
      pathLength="1"/>
    <!-- BARRA DE PROGRESO: fill principal con brillo intenso -->
    <path id="progressBar" d="${progressPath}" fill="none" stroke="${sheetData.accent}" stroke-width="3" stroke-linecap="round"
      style="filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 8px ${sheetData.accent}) drop-shadow(0 0 16px ${sheetData.accent}); stroke-dasharray: 1; stroke-dashoffset: 1;"
      pathLength="1"/>
    ${sheetData.id === 'home' ? `

    <!-- HOME: PATH INTERIOR para el auto (haz de luz propio) -->
    <path id="autoPathDef" d="${innerProgressPath}" fill="none" stroke="none" pathLength="1"/>
    <path id="autoBarGlow" d="${innerProgressPath}" fill="none" stroke="#00e5d4" stroke-width="6" stroke-linecap="round"
      style="filter: blur(4px) drop-shadow(0 0 8px #00e5d4); opacity: 0.6; stroke-dasharray: 1; stroke-dashoffset: 1;"
      pathLength="1"/>
    <path id="autoBar" d="${innerProgressPath}" fill="none" stroke="#00e5d4" stroke-width="3" stroke-linecap="round"
      style="filter: drop-shadow(0 0 4px #fff) drop-shadow(0 0 8px #00e5d4) drop-shadow(0 0 16px #00e5d4); stroke-dasharray: 1; stroke-dashoffset: 1;"
      pathLength="1"/>

    <!-- HOME: moto visual sobre el camino existente; no toca el contador/progreso -->
    <g id="motoRunner">
      <image href="moto.png" x="-30" y="-15" width="60" height="30"/>
    </g>
    <!-- HOME: auto recorriendo el camino INTERIOR (al lado opuesto de la moto) -->
    <g id="autoRunner">
      <image href="auto.png" x="-32" y="-14" width="64" height="28"/>
    </g>
    ` : sheetData.id === 'major' ? `
    <!-- MOTO en la barra de progreso -->
    <g id="motoRunner">
      <image href="moto.png" x="-30" y="-15" width="60" height="30"/>
    </g>
    ` : sheetData.id === 'grand' ? `
    <!-- AUTO en la barra de progreso -->
    <g id="motoRunner">
      <image href="auto.png" x="-32" y="-14" width="64" height="28"/>
    </g>
    ` : `
    <!-- Punta brillante: cabeza blanca que va llenando -->
    <path id="progressBarHead" d="${progressPath}" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"
      style="filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 12px ${sheetData.accent}); stroke-dasharray: 0.005 1; stroke-dashoffset: 1;"
      pathLength="1"/>
    `}
  `;

  // Tornillos con id e ids para poder encenderlos cuando el runner los alcanza
  svgContent += '<g class="corner-screws">';
  screws.forEach((s, idx) => {
    svgContent += `<circle id="screw-${idx}" class="corner-screw" data-cx="${s.cx}" data-cy="${s.cy}" cx="${s.cx}" cy="${s.cy}" r="6" fill="#1a0000" stroke="url(#goldStroke)" stroke-width="1.5"/>`;
  });
  svgContent += '</g>';
  svgContent += '<g class="corner-crosses" stroke="#ffd600" stroke-width="1.2" stroke-linecap="round" style="filter: drop-shadow(0 0 1.5px #000) drop-shadow(0 0 3px rgba(0,0,0,0.8));">';
  screws.forEach((s, idx) => {
    svgContent += `<line class="screw-cross" data-screw="${idx}" x1="${s.cx - 5}" y1="${s.cy}" x2="${s.cx + 5}" y2="${s.cy}"/>`;
    svgContent += `<line class="screw-cross" data-screw="${idx}" x1="${s.cx}" y1="${s.cy - 5}" x2="${s.cx}" y2="${s.cy + 5}"/>`;
  });
  svgContent += '</g>';

  // HOME no muestra banderas a cuadros (no son carrera de jackpot)
  if (sheetData.id !== 'home') {
    [flagL_x, flagR_x].forEach(fx => {
      svgContent += `<rect x="${fx}" y="${flag_y}" width="${flagW}" height="${flagH}" fill="#000" stroke="#ffd600" stroke-width="0.8"/>`;
      svgContent += '<g fill="#fff">';
      svgContent += `<rect x="${fx}" y="${flag_y}" width="11" height="7"/>`;
      svgContent += `<rect x="${fx + 22}" y="${flag_y}" width="11" height="7"/>`;
      svgContent += `<rect x="${fx + 44}" y="${flag_y}" width="11" height="7"/>`;
      svgContent += `<rect x="${fx + 11}" y="${flag_y + 7}" width="11" height="7"/>`;
      svgContent += `<rect x="${fx + 33}" y="${flag_y + 7}" width="11" height="7"/>`;
      svgContent += `<rect x="${fx + 55}" y="${flag_y + 7}" width="9" height="7"/>`;
    svgContent += '</g>';
    });
  }

  svgContent += '<g>';
  bulbs.forEach((b, i) => {
    const blinkType = i % 2 === 0 ? 'bulbBlink' : 'bulbBlinkAlt';
    svgContent += `<circle cx="${b.cx}" cy="${b.cy}" r="14" fill="url(#bulbHalo)" filter="url(#bigGlow)" style="animation:${blinkType} 1.4s infinite;animation-delay:${b.delay}s;"/>`;
    svgContent += `<circle cx="${b.cx}" cy="${b.cy}" r="6" fill="url(#bigBulb)" style="animation:${blinkType} 1.4s infinite;animation-delay:${b.delay}s;"/>`;
  });
  svgContent += '</g>';

  svg.innerHTML = svgContent;
  progressBarPath = document.getElementById('progressBar');

  // Restaurar el progreso real INMEDIATAMENTE (no dejar la barra en 0).
  // Si el shield se reconstruye (resize, modal cerrandose, etc) y estamos
  // a mitad del HOME/sheet, la barra debe seguir donde estaba.
  if (progressBarPath && nextChangeTime > 0) {
    const now = performance.now();
    const curDuration = getDurationForSheet(currentSheetIdx);
    const remaining = nextChangeTime - now;
    const elapsed = curDuration - remaining;
    const progress = Math.max(0, Math.min(1, elapsed / curDuration));
    const offset = (1 - progress).toFixed(4);
    progressBarPath.style.strokeDashoffset = offset;
    const glow = document.getElementById('progressBarGlow');
    const head = document.getElementById('progressBarHead');
    if (glow) glow.style.strokeDashoffset = offset;
    if (head) head.style.strokeDashoffset = offset;
  }
}

// =================================================================
// CONSTRUIR UNA HOJA DEL CARRUSEL
// =================================================================
function buildSheet(data) {
  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.dataset.theme = data.theme;
  sheet.dataset.id = data.id;
  sheet.style.setProperty('--theme-accent', data.accent);

  // Despachar segun tipo de hoja
  if (data.type === 'home') {
    return buildHomeSheet(data, sheet);
  }
  if (data.type === 'moto') {
    return buildMotoSheet(data, sheet);
  }
  if (data.type === 'car') {
    return buildCarSheet(data, sheet);
  }

  // Reels SIEMPRE empiezan en 0 - JS los pone en su lugar
  // Cada strip tiene 11 spans con dígitos 0-9-0 para poder mostrar cualquier dígito
  const reels = [0,0,0,0,0,0,0].map((_, idx) => {
    const digits = [];
    for (let d = 0; d < 11; d++) {
      digits.push(`<span>${d % 10}</span>`);
    }
    return `<div class="reel-digit"><div class="reel-strip" data-digit="0">${digits.join('')}</div></div>`;
  });

  // Insertar separadores: , entre indice 1 y 2, . entre 4 y 5
  const reelHTML = `
    <span class="reel-prefix">S/.</span>
    ${reels[0]}${reels[1]}
    <span class="reel-sep">,</span>
    ${reels[2]}${reels[3]}${reels[4]}
    <span class="reel-sep">.</span>
    ${reels[5]}${reels[6]}
  `;

  sheet.innerHTML = `
    <div class="scan-line"></div>
    <div class="spark-dot" style="top:18%;left:18%;animation-delay:0s;"></div>
    <div class="spark-dot" style="top:22%;right:18%;animation-delay:0.6s;"></div>
    <div class="spark-dot" style="bottom:18%;left:18%;animation-delay:0.8s;"></div>
    <div class="spark-dot" style="bottom:22%;right:18%;animation-delay:0.2s;"></div>

    <div class="sheet-title">${data.title}</div>
    <div class="sheet-subtitle">${data.subtitle}</div>

    <div class="amount-frame">
      <svg class="amount-frame-neon" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Capa 1: glow exterior dorado (escala con viewport) -->
        <rect class="neon-pulse-glow"
              x="0" y="0"
              fill="none"
              stroke="#ffaa00"
              stroke-linecap="round"
              rx="8" ry="8"
              style="width:100%; height:100%;"/>
        <!-- Capa 2: haz dorado principal (escala con viewport, mismo ancho que el borde dorado) -->
        <rect class="neon-pulse"
              x="0" y="0"
              fill="none"
              stroke="#ffd700"
              stroke-linecap="round"
              rx="8" ry="8"
              style="width:100%; height:100%;"/>
      </svg>
      <div class="reel-row">${reelHTML}</div>
    </div>

    <div class="bottom-row">
      <div class="thermometer">
        <div class="thermo-label">CALOR</div>
        <div class="thermo-tube-wrap">
          <div class="thermo-tube">
            <div class="thermo-fill" style="height:${data.temp}%"></div>
            <div class="bubble" style="left:4px;animation-delay:0s;"></div>
            <div class="bubble" style="left:7px;animation-delay:0.8s;"></div>
          </div>
        </div>
        <div class="thermo-bulb"></div>
        <div class="thermo-value">${data.temp}%</div>
      </div>

      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="kpis-chain-wrap">
          <svg class="kpis-chain-svg" viewBox="0 0 800 120" preserveAspectRatio="none">
            <defs>
              <radialGradient id="concave-${data.id}" cx="0.5" cy="0.5" r="0.7">
                <stop offset="0%" stop-color="#000"/>
                <stop offset="60%" stop-color="${data.accent}33"/>
                <stop offset="100%" stop-color="${data.accent}66"/>
              </radialGradient>
            </defs>
            <!-- Eslabon 1: empieza recto a la izq, termina con ojo derecho -->
            <path d="M 5 30 L 160 30 Q 200 30 200 60 Q 200 90 160 90 L 5 90 Z"
                  fill="#000" stroke="${data.accent}" stroke-width="3"/>
            <path d="M 15 35 L 160 35 Q 192 35 192 50" fill="none" stroke="${data.accent}" stroke-width="1.5" opacity="0.45"/>

            <!-- Eslabon 2: ojos a izq y der -->
            <path d="M 180 10 Q 140 10 140 60 Q 140 110 180 110 L 360 110 Q 400 110 400 60 Q 400 10 360 10 Z"
                  fill="#000" stroke="${data.accent}" stroke-width="3"/>
            <path d="M 195 18 Q 152 18 152 50 M 360 18 Q 392 18 392 50" fill="none" stroke="${data.accent}" stroke-width="1.5" opacity="0.45"/>

            <!-- Eslabon 3 -->
            <path d="M 380 30 Q 340 30 340 60 Q 340 90 380 90 L 560 90 Q 600 90 600 60 Q 600 30 560 30 Z"
                  fill="#000" stroke="${data.accent}" stroke-width="3"/>
            <path d="M 392 35 Q 352 35 352 50 M 560 35 Q 592 35 592 50" fill="none" stroke="${data.accent}" stroke-width="1.5" opacity="0.45"/>

            <!-- Eslabon 4: ojo izq + termina recto -->
            <path d="M 580 10 Q 540 10 540 60 Q 540 110 580 110 L 795 110 L 795 10 Z"
                  fill="#000" stroke="${data.accent}" stroke-width="3"/>
            <path d="M 595 18 Q 552 18 552 50" fill="none" stroke="${data.accent}" stroke-width="1.5" opacity="0.45"/>
          </svg>
          <div class="kpis-chain-overlay">
            <div class="chain-cell">
              <div class="stat-label">GEAR</div>
              <div class="stat-value" style="color:#ffd600;text-shadow:0 0 6px #ffd600;">${data.stats.gear}</div>
            </div>
            <div class="chain-cell">
              <div class="stat-label">KM/H</div>
              <div class="stat-value blink" style="color:#ff8800;text-shadow:0 0 6px #ff8800;">${data.stats.kmh}</div>
            </div>
            <div class="chain-cell">
              <div class="stat-label">TEMP</div>
              <div class="stat-value" style="color:${data.accent};text-shadow:0 0 6px ${data.accent};">${data.stats.temp}</div>
            </div>
            <div class="chain-cell">
              <div class="stat-label">STATUS</div>
              <div class="stat-value blink" style="color:#00ff66;text-shadow:0 0 6px #00ff66;font-size:1.3cqw;margin-top:2px;">${data.stats.status}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  return sheet;
}
